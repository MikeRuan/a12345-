<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老鹰抓鱼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    width: 600px;
    height: 700px;
    overflow: hidden;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,150,255,0.5);
  }
  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
    display: none;
  }
  /* Start screen */
  #startScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 100;
    pointer-events: auto;
    background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 55%, #006994 55%, #004d6e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  #startScreen h1 {
    font-size: 48px;
    color: #fff;
    text-shadow: 3px 3px 0 #e07b00, -1px -1px 0 #c06000;
    letter-spacing: 4px;
  }
  #startScreen p {
    font-size: 15px;
    color: #fff;
    background: rgba(0,0,0,0.3);
    padding: 10px 20px;
    border-radius: 10px;
    text-align: center;
    line-height: 1.8;
    max-width: 440px;
  }
  .menuBtn {
    background: linear-gradient(135deg, #ff8c00, #ff4500);
    color: white;
    border: none;
    padding: 14px 40px;
    font-size: 20px;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(255,100,0,0.5);
    transition: transform 0.1s;
    pointer-events: auto;
  }
  .menuBtn:hover { transform: scale(1.07); }
  /* HUD */
  #hud {
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    z-index: 50;
    display: none;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }
  .hudBox {
    background: rgba(0,0,0,0.45);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: bold;
  }
  /* Overlay screens */
  #overlayScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 200;
    pointer-events: auto;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(0,0,0,0.65);
  }
  #overlayScreen h2 {
    font-size: 42px;
    color: #fff;
    text-shadow: 2px 2px 6px #000;
  }
  #overlayScreen p {
    font-size: 18px;
    color: #ffd700;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="600" height="700"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hudBox" id="hudScore">分数: 0</div>
    <div class="hudBox" id="hudLevel">第1关</div>
    <div class="hudBox" id="hudLives">❤️❤️❤️</div>
  </div>

  <!-- Start Screen -->
  <div id="startScreen">
    <h1>🦅 老鹰抓鱼</h1>
    <p>
      🎮 用 ← → ↑ ↓ 方向键（或WASD）控制老鹰<br>
      🐟 大鱼+2分 中鱼+1分 小鱼+0.5分<br>
      🦈 碰到鲨鱼失去一条命<br>
      ⏱️ 在水中超过1.5秒会自动飞回水面！<br>
      🌊 共三关，达到5分过关，风雨越来越大！
    </p>
    <button class="menuBtn" id="startBtn">开始游戏</button>
  </div>

  <!-- Overlay (level clear / game over / win) -->
  <div id="overlayScreen">
    <h2 id="overlayTitle">过关！</h2>
    <p id="overlayMsg">得分: 0</p>
    <button class="menuBtn" id="overlayBtn">继续</button>
    <button class="menuBtn" id="menuBtn" style="background:linear-gradient(135deg,#555,#222);">返回菜单</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // ===== DOM References =====
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('startScreen');
  const hud = document.getElementById('hud');
  const overlayScreen = document.getElementById('overlayScreen');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg = document.getElementById('overlayMsg');
  const overlayBtn = document.getElementById('overlayBtn');
  const menuBtn = document.getElementById('menuBtn');
  const hudScore = document.getElementById('hudScore');
  const hudLevel = document.getElementById('hudLevel');
  const hudLives = document.getElementById('hudLives');

  // ===== Game State =====
  let score = 0;          // stored as integer×10 internally, displayed with 0.5 steps
  let lives = 3;
  let level = 1;
  let gameRunning = false;
  let animId = null;

  // ===== Eagle underwater timer =====
  // Counts frames the eagle has been below seaY()
  let underwaterFrames = 0;
  const UNDERWATER_LIMIT = 90; // 1.5 seconds × 60 fps = 90 frames
  let forcedReturn = false;    // true while eagle is being pushed back up

  // ===== Level Config =====
  // Fish speed is now FIXED at 1.5 for all levels — only wind/wave/rain change
  const levelConfig = {
    1: { windX: 0,   windY: 0,   waveAmp: 10, waveSpeed: 0.02, rainCount: 0,   fishCount: 6, sharkCount: 1, fishSpeed: 1.5, targetScore: 50 },
    2: { windX: 0.5, windY: 0.15,waveAmp: 28, waveSpeed: 0.055,rainCount: 80,  fishCount: 7, sharkCount: 2, fishSpeed: 1.5, targetScore: 50 },
    3: { windX: 1.1, windY: 0.3, waveAmp: 45, waveSpeed: 0.09, rainCount: 150, fishCount: 8, sharkCount: 3, fishSpeed: 1.5, targetScore: 50 }
  };
  // targetScore is stored ×10 (5 points = 50 in internal units)

  // ===== Fish size categories & points =====
  // Size determines display radius AND score:
  //   big   size>=22 → 2 points  (stored as 20 internally)
  //   medium size 16-21 → 1 point (stored as 10)
  //   small  size<16  → 0.5 point (stored as 5)
  const FISH_TYPES = [
    { name:'大金鱼',  color:'#ff6600', size: 26 },  // big   +2
    { name:'大金鲳',  color:'#ffd700', size: 24 },  // big   +2
    { name:'中蓝鱼',  color:'#00aaff', size: 20 },  // medium+1
    { name:'中绿鱼',  color:'#00cc44', size: 18 },  // medium+1
    { name:'小彩鱼',  color:'#ff44cc', size: 13 },  // small +0.5
    { name:'小红鱼',  color:'#ff2222', size: 11 },  // small +0.5
  ];

  // Return internal score value based on size
  function fishPoints(size) {
    if (size >= 22) return 20;   // 2 points
    if (size >= 16) return 10;   // 1 point
    return 5;                    // 0.5 points
  }

  // Display string for score popup
  function fishPointsLabel(size) {
    if (size >= 22) return '+2';
    if (size >= 16) return '+1';
    return '+0.5';
  }

  // Display score as decimal (internal ÷ 10)
  function displayScore(s) {
    if (s % 10 === 0) return String(s / 10);
    return (s / 10).toFixed(1);
  }

  // ===== Eagle =====
  const eagle = {
    x: 280, y: 200,
    w: 52, h: 40,
    vx: 0, vy: 0,
    speed: 3.5,
    wingPhase: 0,
    invincible: 0,
    diving: false
  };

  // ===== Input =====
  const keys = {};
  document.addEventListener('keydown', e => { keys[e.key] = true; });
  document.addEventListener('keyup',   e => { keys[e.key] = false; });

  // ===== Clouds =====
  let clouds = [];
  function initClouds() {
    clouds = [];
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * 600,
        y: 30 + Math.random() * 120,
        w: 80 + Math.random() * 80,
        speed: 0.3 + Math.random() * 0.4,
        alpha: 0.7 + Math.random() * 0.3
      });
    }
  }

  // ===== Background Birds =====
  let bgBirds = [];
  function initBgBirds() {
    bgBirds = [];
    for (let i = 0; i < 4; i++) {
      bgBirds.push({
        x: Math.random() * 600,
        y: 40 + Math.random() * 140,
        speed: 0.5 + Math.random() * 0.8,
        phase: Math.random() * Math.PI * 2,
        size: 6 + Math.random() * 6
      });
    }
  }

  // ===== Rain =====
  let rainDrops = [];
  function initRain(count) {
    rainDrops = [];
    for (let i = 0; i < count; i++) {
      rainDrops.push({
        x: Math.random() * 600,
        y: Math.random() * 700,
        len: 8 + Math.random() * 12,
        speed: 6 + Math.random() * 4
      });
    }
  }

  // ===== Waves =====
  let waveOffset = 0;

  // ===== Fish =====
  let fishes = [];

  function spawnFish(cfg) {
    fishes = [];
    // Normal fish — mixed sizes
    for (let i = 0; i < cfg.fishCount; i++) {
      const ft = FISH_TYPES[Math.floor(Math.random() * FISH_TYPES.length)];
      const dir = Math.random() < 0.5 ? 1 : -1;
      fishes.push({
        x: Math.random() * 560 + 20,
        y: 440 + Math.random() * 200,
        vx: (0.5 + Math.random() * cfg.fishSpeed) * dir,
        vy: (Math.random() - 0.5) * 0.6,
        size: ft.size,
        color: ft.color,
        shark: false,
        phase: Math.random() * Math.PI * 2,
        alive: true
      });
    }
    // Sharks
    for (let i = 0; i < cfg.sharkCount; i++) {
      const dir = Math.random() < 0.5 ? 1 : -1;
      fishes.push({
        x: Math.random() * 560 + 20,
        y: 450 + Math.random() * 180,
        vx: (1 + Math.random() * cfg.fishSpeed * 0.8) * dir,
        vy: (Math.random() - 0.5) * 0.4,
        size: 30,
        color: '#778899',
        shark: true,
        phase: Math.random() * Math.PI * 2,
        alive: true
      });
    }
  }

  // ===== Sea horizon Y =====
  function seaY() { return 380; }

  // ===== Init Level =====
  function initLevel(lv) {
    level = lv;
    const cfg = levelConfig[lv];
    eagle.x = 280;
    eagle.y = 200;
    eagle.vx = 0;
    eagle.vy = 0;
    eagle.invincible = 0;
    underwaterFrames = 0;
    forcedReturn = false;
    initClouds();
    initBgBirds();
    initRain(cfg.rainCount);
    spawnFish(cfg);
    waveOffset = 0;
    hudLevel.textContent = `第${lv}关`;
    updateHUD();
  }

  function updateHUD() {
    hudScore.textContent = `分数: ${displayScore(score)}`;
    hudLives.textContent = '❤️'.repeat(Math.max(0, lives));
  }

  // ===== Start Game =====
  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    startScreen.style.display = 'none';
    overlayScreen.style.display = 'none';
    canvas.style.display = 'block';
    hud.style.display = 'flex';
    initLevel(1);
    gameRunning = true;
    if (animId) cancelAnimationFrame(animId);
    gameLoop();
  }

  // ===== Show Overlay =====
  function showOverlay(title, msg, btnText) {
    gameRunning = false;
    overlayTitle.textContent = title;
    overlayMsg.textContent = msg;
    overlayBtn.textContent = btnText;
    overlayScreen.style.display = 'flex';
  }

  // ===== Go to Menu =====
  function goMenu() {
    gameRunning = false;
    if (animId) cancelAnimationFrame(animId);
    overlayScreen.style.display = 'none';
    canvas.style.display = 'none';
    hud.style.display = 'none';
    startScreen.style.display = 'flex';
  }

  // ===== Draw Cloud =====
  function drawCloud(c) {
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.w * 0.3, 0, Math.PI * 2);
    ctx.arc(c.x + c.w * 0.25, c.y - c.w * 0.1, c.w * 0.22, 0, Math.PI * 2);
    ctx.arc(c.x + c.w * 0.5, c.y, c.w * 0.28, 0, Math.PI * 2);
    ctx.arc(c.x + c.w * 0.15, c.y + c.w * 0.08, c.w * 0.22, 0, Math.PI * 2);
    ctx.arc(c.x + c.w * 0.38, c.y + c.w * 0.08, c.w * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ===== Draw Background Bird =====
  function drawBgBird(b) {
    ctx.save();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    const flap = Math.sin(b.phase) * b.size * 0.5;
    ctx.beginPath();
    ctx.moveTo(b.x - b.size, b.y + flap);
    ctx.quadraticCurveTo(b.x - b.size * 0.5, b.y - flap, b.x, b.y);
    ctx.quadraticCurveTo(b.x + b.size * 0.5, b.y - flap, b.x + b.size, b.y + flap);
    ctx.stroke();
    ctx.restore();
  }

  // ===== Draw Eagle =====
  function drawEagle() {
    const e = eagle;
    // Blink when invincible
    if (e.invincible > 0 && Math.floor(e.invincible / 5) % 2 === 0) return;

    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.vx < 0) ctx.scale(-1, 1);

    const flap = Math.sin(e.wingPhase) * 12;

    // Body
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(18, -6, 8, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(21, -8, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(22, -8.5, 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(25, -5);
    ctx.lineTo(32, -4);
    ctx.lineTo(25, -2);
    ctx.fill();

    // Wings
    ctx.fillStyle = '#5C3310';
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.lineTo(-26, -10 + flap);
    ctx.lineTo(-20, 4);
    ctx.lineTo(0, 5);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5, -5);
    ctx.lineTo(-10, -12 + flap);
    ctx.lineTo(-5, 2);
    ctx.closePath();
    ctx.fillStyle = '#7a4520';
    ctx.fill();

    // Tail
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(-18, 2);
    ctx.lineTo(-30, 8);
    ctx.lineTo(-24, 0);
    ctx.fill();

    // Talons
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(5, 8);
    ctx.lineTo(10, 18); ctx.moveTo(10,18); ctx.lineTo(7, 20);
    ctx.moveTo(10, 18); ctx.lineTo(13, 20);
    ctx.moveTo(10, 18); ctx.lineTo(12, 17);
    ctx.stroke();

    ctx.restore();
  }

  // ===== Draw Fish =====
  function drawFish(f) {
    if (!f.alive) return;
    ctx.save();
    ctx.translate(f.x, f.y);
    if (f.vx < 0) ctx.scale(-1, 1);

    if (f.shark) {
      ctx.fillStyle = '#778899';
      ctx.beginPath();
      ctx.ellipse(0, 0, f.size, f.size * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5a6a7a';
      ctx.beginPath();
      ctx.moveTo(-5, -f.size * 0.45);
      ctx.lineTo(5, -f.size * 0.9);
      ctx.lineTo(15, -f.size * 0.45);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-f.size, 0);
      ctx.lineTo(-f.size - 12, -10);
      ctx.lineTo(-f.size - 12, 10);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(f.size * 0.5, -4, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(f.size * 0.6, 3);
      ctx.lineTo(f.size * 0.7, 8);
      ctx.lineTo(f.size * 0.8, 3);
      ctx.fill();
    } else {
      // Normal fish — body
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, f.size, f.size * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail
      ctx.beginPath();
      ctx.moveTo(-f.size, 0);
      ctx.lineTo(-f.size - 10, -7);
      ctx.lineTo(-f.size - 10, 7);
      ctx.fill();
      // Fin
      ctx.fillStyle = f.color + 'bb';
      ctx.beginPath();
      ctx.moveTo(-4, -f.size * 0.5);
      ctx.lineTo(4, -f.size * 0.5 - 6);
      ctx.lineTo(8, -f.size * 0.5);
      ctx.fill();
      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(f.size * 0.55, -3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(f.size * 0.6, -3.5, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Scales
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      for (let s = -1; s <= 1; s++) {
        ctx.beginPath();
        ctx.arc(s * 6, 0, 5, Math.PI * 0.8, Math.PI * 2.2);
        ctx.stroke();
      }
      // Size label (small icon so player can tell size)
      // Big fish get a small crown indicator
      if (f.size >= 22) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('👑', 0, -f.size * 0.5 - 8);
      }
    }
    ctx.restore();
  }

  // ===== Draw Sea =====
  function drawSea(cfg) {
    const sy = seaY();
    const grad = ctx.createLinearGradient(0, sy, 0, 700);
    grad.addColorStop(0, '#0077b6');
    grad.addColorStop(1, '#023e6e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, sy, 600, 700 - sy);

    ctx.fillStyle = '#00b4d8';
    ctx.beginPath();
    ctx.moveTo(0, sy);
    for (let x = 0; x <= 600; x += 4) {
      const y = sy + Math.sin((x * 0.02) + waveOffset) * cfg.waveAmp
                   + Math.sin((x * 0.035) + waveOffset * 1.3) * (cfg.waveAmp * 0.5);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(600, 700);
    ctx.lineTo(0, 700);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    for (let w = 0; w < 3; w++) {
      ctx.beginPath();
      const off = waveOffset + w * 1.2;
      for (let x = 0; x <= 600; x += 5) {
        const y = sy + 8 + w * 12
                     + Math.sin((x * 0.025) + off) * cfg.waveAmp * 0.6;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  // ===== Draw Sky =====
  function drawSky() {
    const sy = seaY();
    const grad = ctx.createLinearGradient(0, 0, 0, sy);
    const cfg = levelConfig[level];
    if (cfg.rainCount > 80) {
      grad.addColorStop(0, '#4a5568');
      grad.addColorStop(1, '#718096');
    } else if (cfg.rainCount > 0) {
      grad.addColorStop(0, '#6b8fb5');
      grad.addColorStop(1, '#9fc6e0');
    } else {
      grad.addColorStop(0, '#48cae4');
      grad.addColorStop(1, '#90e0ef');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 600, sy);
  }

  // ===== Draw Rain =====
  function drawRain(cfg) {
    if (!rainDrops.length) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(180,210,255,0.6)';
    ctx.lineWidth = 1;
    const angle = Math.atan2(cfg.windY, 1) + 0.2;
    for (const r of rainDrops) {
      ctx.beginPath();
      ctx.moveTo(r.x, r.y);
      ctx.lineTo(r.x + Math.sin(angle) * r.len * 0.8, r.y + r.len);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ===== Draw Wind Lines =====
  function drawWind(cfg) {
    if (cfg.windX < 0.3) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const y = 50 + i * 40 + Math.random() * 10;
      const len = 30 + Math.random() * 60;
      ctx.beginPath();
      ctx.moveTo(Math.random() * 600, y);
      ctx.lineTo(Math.random() * 600 + len, y + 3);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ===== Draw underwater warning bar =====
  function drawUnderwaterBar() {
    if (underwaterFrames <= 0) return;
    const ratio = underwaterFrames / UNDERWATER_LIMIT;
    const barW = 160;
    const barH = 12;
    const bx = 300 - barW / 2;
    const by = seaY() + 10;

    // Background
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.roundRect(bx - 2, by - 2, barW + 4, barH + 4, 6);
    ctx.fill();

    // Fill — green → yellow → red
    const r = Math.round(255 * ratio);
    const g = Math.round(255 * (1 - ratio));
    ctx.fillStyle = `rgb(${r},${g},20)`;
    ctx.beginPath();
    ctx.roundRect(bx, by, barW * ratio, barH, 4);
    ctx.fill();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⏱️ 在水里太久！', 300, by + barH + 14);
    ctx.restore();
  }

  // ===== Score Popups =====
  let popups = [];
  function addPopup(x, y, text, color) {
    popups.push({ x, y, text, color, life: 60, vy: -1.5 });
  }
  function drawPopups() {
    for (const p of popups) {
      ctx.save();
      ctx.globalAlpha = p.life / 60;
      ctx.fillStyle = p.color || '#FFD700';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
      p.y += p.vy;
      p.life--;
    }
    popups = popups.filter(p => p.life > 0);
  }

  // ===== Particle Effects =====
  let particles = [];
  function spawnParticles(x, y, color) {
    for (let i = 0; i < 10; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5,
        life: 30,
        color
      });
    }
  }
  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life / 30;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
  }

  // ===== Update Logic =====
  function update() {
    if (!gameRunning) return;
    const cfg = levelConfig[level];

    // ---- Underwater timer ----
    const inWater = eagle.y > seaY();
    if (inWater) {
      underwaterFrames++;
    } else {
      // Reset timer once eagle is above the surface
      underwaterFrames = 0;
      forcedReturn = false;
    }

    // Trigger forced return when limit exceeded
    if (underwaterFrames >= UNDERWATER_LIMIT) {
      forcedReturn = true;
    }

    // Forced return: push eagle strongly upward until it clears the surface
    if (forcedReturn) {
      eagle.vy -= 0.6;                         // strong upward acceleration
      eagle.vx *= 0.9;                         // dampen horizontal
      // Show a warning popup occasionally
      if (underwaterFrames % 20 === 0) {
        addPopup(eagle.x, eagle.y - 20, '⬆️ 飞回去！', '#ff4444');
      }
    } else {
      // Normal wind effect
      eagle.vx += cfg.windX * 0.05;
      eagle.vy += cfg.windY * 0.05;

      // Eagle controls
      if (keys['ArrowLeft']  || keys['a'] || keys['A'])  eagle.vx -= eagle.speed * 0.2;
      if (keys['ArrowRight'] || keys['d'] || keys['D'])  eagle.vx += eagle.speed * 0.2;
      if (keys['ArrowUp']    || keys['w'] || keys['W'])  eagle.vy -= eagle.speed * 0.2;
      if (keys['ArrowDown']  || keys['s'] || keys['S'])  eagle.vy += eagle.speed * 0.2;
    }

    // Damping
    eagle.vx *= 0.85;
    eagle.vy *= 0.85;

    // Clamp speed (allow faster escape during forced return)
    const maxSpd = forcedReturn ? eagle.speed * 2 : eagle.speed;
    const spd = Math.sqrt(eagle.vx ** 2 + eagle.vy ** 2);
    if (spd > maxSpd) {
      eagle.vx = (eagle.vx / spd) * maxSpd;
      eagle.vy = (eagle.vy / spd) * maxSpd;
    }

    eagle.x += eagle.vx;
    eagle.y += eagle.vy;
    eagle.wingPhase += 0.18;

    // Eagle bounds
    eagle.x = Math.max(26, Math.min(574, eagle.x));
    eagle.y = Math.max(30, Math.min(650, eagle.y));  // can go a bit deeper while diving

    // Invincibility countdown
    if (eagle.invincible > 0) eagle.invincible--;

    // Move clouds
    for (const c of clouds) {
      c.x += c.speed + cfg.windX * 1.5;
      if (c.x > 700) c.x = -100;
    }

    // Move bg birds
    for (const b of bgBirds) {
      b.x += b.speed + cfg.windX;
      b.phase += 0.12;
      if (b.x > 660) b.x = -40;
    }

    // Move rain
    for (const r of rainDrops) {
      r.x += cfg.windX * 3;
      r.y += r.speed;
      if (r.y > 700) { r.y = -10; r.x = Math.random() * 600; }
      if (r.x > 600) r.x -= 600;
    }

    // Move fish
    for (const f of fishes) {
      if (!f.alive) continue;
      f.phase += 0.05;
      f.x += f.vx;
      f.y += f.vy + Math.sin(f.phase) * 0.4;

      if (f.y < seaY() + 15) { f.y = seaY() + 15; f.vy = Math.abs(f.vy) + 0.1; }
      if (f.y > 680) { f.y = 680; f.vy = -Math.abs(f.vy) - 0.1; }
      if (f.x < 10)  { f.x = 10;  f.vx = Math.abs(f.vx); }
      if (f.x > 590) { f.x = 590; f.vx = -Math.abs(f.vx); }
    }

    // Wave
    waveOffset += cfg.waveSpeed;

    // Collision detection — eagle vs fish
    if (eagle.invincible === 0) {
      for (const f of fishes) {
        if (!f.alive) continue;
        const dx = eagle.x - f.x;
        const dy = eagle.y - f.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const hitR = eagle.w * 0.38 + f.size * 0.7;

        if (dist < hitR) {
          if (f.shark) {
            lives--;
            eagle.invincible = 90;
            spawnParticles(eagle.x, eagle.y, '#ff4444');
            addPopup(eagle.x, eagle.y - 30, '💥 被鲨鱼咬了！', '#ff4444');
            updateHUD();
            if (lives <= 0) {
              setTimeout(() => showOverlay('💀 游戏结束', `最终得分: ${displayScore(score)}`, '再来一次'), 400);
            }
          } else {
            // Caught a fish — award points based on size
            f.alive = false;
            const pts = fishPoints(f.size);
            score += pts;
            spawnParticles(f.x, f.y, f.color);
            addPopup(f.x, f.y - 20, fishPointsLabel(f.size), '#FFD700');
            updateHUD();
          }
        }
      }
    }

    // Check level complete (target: 5 points = 50 internal)
    const cfg2 = levelConfig[level];
    if (score >= cfg2.targetScore) {
      if (level < 3) {
        gameRunning = false;
        setTimeout(() => {
          showOverlay(
            `🎉 第${level}关通过！`,
            `得分: ${displayScore(score)} / 目标: 5分\n继续挑战第${level+1}关！`,
            `第${level+1}关`
          );
        }, 300);
      } else {
        gameRunning = false;
        setTimeout(() => showOverlay('🏆 你赢了！', `全部三关通过！最终得分: ${displayScore(score)}`, '再玩一次'), 300);
      }
    }
  }

  // ===== Draw Everything =====
  function draw() {
    const cfg = levelConfig[level];
    ctx.clearRect(0, 0, 600, 700);

    drawSky();
    drawWind(cfg);

    for (const c of clouds) drawCloud(c);
    for (const b of bgBirds) drawBgBird(b);
    drawRain(cfg);
    drawSea(cfg);
    for (const f of fishes) drawFish(f);
    drawEagle();
    drawParticles();
    drawPopups();

    // Underwater warning bar (shown when eagle is in water)
    drawUnderwaterBar();

    // Level target indicator at bottom
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.roundRect(190, 668, 220, 24, 8);
    ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.font = '13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`目标: ${displayScore(score)} / 5分`, 300, 685);
    ctx.restore();

    // Fish size legend (top-right corner, small)
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.roundRect(470, 50, 120, 60, 8);
    ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.font = '11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('👑大鱼 +2分', 480, 68);
    ctx.fillStyle = '#aef';
    ctx.fillText('●中鱼 +1分', 480, 85);
    ctx.fillStyle = '#faa';
    ctx.fillText('·小鱼 +0.5分', 480, 102);
    ctx.restore();
  }

  // ===== Game Loop =====
  function gameLoop() {
    update();
    draw();
    animId = requestAnimationFrame(gameLoop);
  }

  // ===== Touch Controls =====
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!touchStart) return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    // During forced return, only allow upward touch input
    if (!forcedReturn) {
      eagle.vx += dx * 0.04;
      eagle.vy += dy * 0.04;
    }
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: false });
  canvas.addEventListener('touchend', () => { touchStart = null; });

  // ===== Button Handlers =====
  document.getElementById('startBtn').addEventListener('click', function() {
    startGame();
  });

  overlayBtn.addEventListener('click', function() {
    overlayScreen.style.display = 'none';
    const btnText = overlayBtn.textContent;
    if (btnText === '再来一次' || btnText === '再玩一次') {
      startGame();
    } else if (btnText.includes('关')) {
      // Advance to next level — score carries over
      level++;
      initLevel(level);
      gameRunning = true;
      gameLoop();
    }
  });

  menuBtn.addEventListener('click', function() {
    goMenu();
  });

  // BUTTON CHECKLIST: #startBtn ✓  #overlayBtn ✓  #menuBtn ✓

});

  /* auto-injected handler for #overlayBtn */
  var _btn_overlayBtn = document.getElementById('overlayBtn');
  if (_btn_overlayBtn) _btn_overlayBtn.addEventListener('click', function() {
    var ss = document.getElementById('startScreen') || document.querySelector('.start-screen, .menu, #menu');
    var cv = document.querySelector('canvas');
    if (ss) ss.style.display = 'none';
    if (cv) cv.style.display = 'block';
  });
  /* auto-injected handler for #menuBtn */
  var _btn_menuBtn = document.getElementById('menuBtn');
  if (_btn_menuBtn) _btn_menuBtn.addEventListener('click', function() {
    var ss = document.getElementById('startScreen') || document.querySelector('.start-screen, .menu, #menu');
    var cv = document.querySelector('canvas');
    if (ss) ss.style.display = 'none';
    if (cv) cv.style.display = 'block';
  });
</script>
