<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老鹰抓鱼 🦅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    width: 480px;
    height: 640px;
    overflow: hidden;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,200,255,0.4);
  }
  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
    display: none;
  }
  /* Start Screen */
  #startScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 100;
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 55%, #1565C0 55%, #1976D2 100%);
  }
  #startScreen h1 {
    font-size: 42px;
    color: #fff;
    text-shadow: 3px 3px 0 #c8621a, -1px -1px 0 #c8621a;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }
  #startScreen .subtitle {
    font-size: 16px;
    color: #fff3e0;
    margin-bottom: 30px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  }
  .eagle-icon { font-size: 80px; margin-bottom: 16px; animation: float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .rules-box {
    background: rgba(255,255,255,0.85);
    border-radius: 14px;
    padding: 16px 24px;
    margin-bottom: 28px;
    max-width: 340px;
    text-align: left;
  }
  .rules-box h3 { color: #c8621a; margin-bottom: 8px; font-size: 16px; }
  .rules-box p { font-size: 13px; color: #333; line-height: 1.8; }
  .rules-box span { font-size: 15px; }
  #startBtn {
    background: linear-gradient(135deg, #ff8c00, #ff4500);
    color: white;
    border: none;
    padding: 16px 48px;
    font-size: 22px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 2px;
    box-shadow: 0 6px 20px rgba(255,100,0,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #startBtn:hover { transform: scale(1.07); box-shadow: 0 8px 28px rgba(255,100,0,0.7); }
  /* Game Over Screen */
  #gameOverScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 100;
    pointer-events: auto;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
  }
  #gameOverScreen h2 { font-size: 48px; color: #ff4444; text-shadow: 2px 2px 0 #800; margin-bottom: 10px; }
  #gameOverScreen .score-display {
    font-size: 22px; color: #ffd700; margin-bottom: 6px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
  }
  #gameOverScreen .high-score-display {
    font-size: 17px; color: #aaa; margin-bottom: 30px;
  }
  #restartBtn {
    background: linear-gradient(135deg, #00c853, #00796b);
    color: white;
    border: none;
    padding: 14px 44px;
    font-size: 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 6px 20px rgba(0,200,100,0.5);
    transition: transform 0.1s;
  }
  #restartBtn:hover { transform: scale(1.07); }
  /* HUD */
  #hud {
    position: absolute;
    top: 10px; left: 0; right: 0;
    z-index: 50;
    display: none;
    justify-content: space-between;
    align-items: center;
    padding: 0 14px;
    pointer-events: none;
  }
  .hud-box {
    background: rgba(0,0,0,0.45);
    border-radius: 20px;
    padding: 5px 14px;
    color: #fff;
    font-size: 15px;
    font-weight: bold;
  }
  .hud-box span { font-size: 18px; }
  #livesDisplay { color: #ff6b6b; }
  #scoreDisplay { color: #ffd700; }
  #levelDisplay { color: #69f0ae; }
</style>
</head>
<body>
<div id="gameContainer">
  <!-- Canvas layer (behind UI) -->
  <canvas id="gameCanvas" width="480" height="640"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-box" id="livesDisplay">❤️ <span id="livesVal">3</span></div>
    <div class="hud-box" id="scoreDisplay">🐟 <span id="scoreVal">0</span></div>
    <div class="hud-box" id="levelDisplay">Lv.<span id="levelVal">1</span></div>
  </div>

  <!-- Start Screen -->
  <div id="startScreen">
    <div class="eagle-icon">🦅</div>
    <h1>老鹰抓鱼</h1>
    <p class="subtitle">Eagle Fishing Master</p>
    <div class="rules-box">
      <h3>🎮 游戏说明</h3>
      <p><span>🖱️ 鼠标/手指</span> 控制老鹰移动</p>
      <p><span>🐟</span> 俯冲入水抓鱼得分</p>
      <p><span>🐊</span> 碰到鳄鱼会失去生命</p>
      <p><span>🐦</span> 小心天上的其他鸟儿</p>
      <p><span>❤️</span> 共有 3 条命，加油！</p>
    </div>
    <button id="startBtn">🦅 开始游戏</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen">
    <h2>💀 游戏结束</h2>
    <div class="score-display">得分：<span id="finalScore">0</span> 条鱼</div>
    <div class="high-score-display">最高分：<span id="highScoreVal">0</span> 条鱼</div>
    <button id="restartBtn">🔄 再玩一次</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // ─── Elements ───────────────────────────────────────────
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const hud = document.getElementById('hud');
  const livesVal = document.getElementById('livesVal');
  const scoreVal = document.getElementById('scoreVal');
  const levelVal = document.getElementById('levelVal');
  const finalScore = document.getElementById('finalScore');
  const highScoreVal = document.getElementById('highScoreVal');

  // ─── Game State ─────────────────────────────────────────
  let score = 0, lives = 3, level = 1, highScore = 0;
  let gameRunning = false;
  let animFrame;
  const WATER_Y = H * 0.52; // water surface y position

  // ─── Eagle ──────────────────────────────────────────────
  const eagle = {
    x: W / 2, y: 120,
    w: 54, h: 38,
    targetX: W / 2, targetY: 120,
    vx: 0, vy: 0,
    diving: false,     // flying down into water
    returning: false,  // flying back up
    inWater: false,
    invincible: 0,     // frames of invincibility
    catchEffect: 0,    // frames for catch flash
    diveStartY: 0
  };

  // ─── Clouds ─────────────────────────────────────────────
  const clouds = [];
  function spawnCloud() {
    clouds.push({
      x: W + 60,
      y: 30 + Math.random() * (WATER_Y * 0.45),
      w: 60 + Math.random() * 70,
      h: 30 + Math.random() * 20,
      speed: 0.4 + Math.random() * 0.5
    });
  }
  // initial clouds
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 30 + Math.random() * (WATER_Y * 0.45),
      w: 60 + Math.random() * 70,
      h: 30 + Math.random() * 20,
      speed: 0.4 + Math.random() * 0.5
    });
  }

  // ─── Birds (obstacles in sky) ───────────────────────────
  const birds = [];
  function spawnBird() {
    const fromLeft = Math.random() < 0.5;
    birds.push({
      x: fromLeft ? -40 : W + 40,
      y: 40 + Math.random() * (WATER_Y * 0.6),
      dir: fromLeft ? 1 : -1,
      speed: 1.2 + Math.random() * 1.5 + level * 0.2,
      wingFrame: 0
    });
  }

  // ─── Fish ────────────────────────────────────────────────
  const fishes = [];
  function spawnFish() {
    fishes.push({
      x: Math.random() * (W - 60) + 30,
      y: WATER_Y + 30 + Math.random() * (H - WATER_Y - 80),
      dir: Math.random() < 0.5 ? 1 : -1,
      speed: 0.5 + Math.random() * 0.8,
      size: 18 + Math.random() * 14,
      type: Math.floor(Math.random() * 3), // 0=normal,1=gold,2=blue
      wiggle: Math.random() * Math.PI * 2
    });
  }

  // ─── Seaweeds ────────────────────────────────────────────
  const seaweeds = [];
  function initSeaweeds() {
    seaweeds.length = 0;
    for (let i = 0; i < 7; i++) {
      seaweeds.push({
        x: Math.random() * (W - 40) + 20,
        h: 30 + Math.random() * 50,
        sway: Math.random() * Math.PI * 2,
        segments: 3 + Math.floor(Math.random() * 3)
      });
    }
  }

  // ─── Crocodiles ──────────────────────────────────────────
  const crocs = [];
  function spawnCroc() {
    const fromLeft = Math.random() < 0.5;
    crocs.push({
      x: fromLeft ? -80 : W + 80,
      y: WATER_Y - 12 + Math.random() * 20,
      dir: fromLeft ? 1 : -1,
      speed: 0.6 + Math.random() * 0.5 + level * 0.15,
      mouthOpen: 0,
      mouthDir: 1,
      snapCooldown: 0
    });
  }

  // ─── Bubbles ─────────────────────────────────────────────
  const bubbles = [];
  function spawnBubble() {
    bubbles.push({
      x: Math.random() * W,
      y: H,
      r: 2 + Math.random() * 4,
      speed: 0.4 + Math.random() * 0.6
    });
  }

  // ─── Score Popups ────────────────────────────────────────
  const popups = [];
  function addPopup(x, y, text, color) {
    popups.push({ x, y, text, color, life: 60 });
  }

  // ─── Mouse / Touch Control ───────────────────────────────
  const container = document.getElementById('gameContainer');
  function getRelPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  canvas.addEventListener('mousemove', function(e) {
    if (!gameRunning) return;
    const p = getRelPos(e);
    eagle.targetX = p.x;
    // eagle can only be controlled above water unless diving
    if (!eagle.diving && !eagle.returning && !eagle.inWater) {
      eagle.targetY = Math.min(p.y, WATER_Y - 30);
    }
  });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (!gameRunning) return;
    const p = getRelPos(e);
    eagle.targetX = p.x;
    if (!eagle.diving && !eagle.returning && !eagle.inWater) {
      eagle.targetY = Math.min(p.y, WATER_Y - 30);
    }
  }, { passive: false });
  // Click/tap to dive
  canvas.addEventListener('click', function(e) {
    if (!gameRunning) return;
    if (!eagle.diving && !eagle.returning && !eagle.inWater) {
      eagle.diving = true;
      eagle.diveStartY = eagle.y;
      eagle.vy = 8;
    }
  });
  canvas.addEventListener('touchend', function(e) {
    if (!gameRunning) return;
    if (!eagle.diving && !eagle.returning && !eagle.inWater) {
      eagle.diving = true;
      eagle.diveStartY = eagle.y;
      eagle.vy = 8;
    }
  });

  // ─── Drawing Helpers ─────────────────────────────────────
  // Draw a cloud
  function drawCloud(x, y, w, h) {
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.beginPath();
    ctx.ellipse(x, y, w * 0.45, h * 0.5, 0, 0, Math.PI * 2);
    ctx.ellipse(x - w * 0.25, y + h * 0.1, w * 0.28, h * 0.38, 0, 0, Math.PI * 2);
    ctx.ellipse(x + w * 0.25, y + h * 0.1, w * 0.28, h * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw a small bird
  function drawBird(x, y, dir, wingFrame) {
    ctx.save();
    ctx.translate(x, y);
    if (dir < 0) ctx.scale(-1, 1);
    // body
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // wings
    const wf = Math.sin(wingFrame * 0.3) * 6;
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, -2);
    ctx.quadraticCurveTo(-14, -8 + wf, -18, -2 + wf);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(2, -2);
    ctx.quadraticCurveTo(8, -8 + wf, 12, -2 + wf);
    ctx.stroke();
    // head
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(11, -2, 5, 0, Math.PI * 2);
    ctx.fill();
    // beak
    ctx.fillStyle = '#f5a623';
    ctx.beginPath();
    ctx.moveTo(15, -1);
    ctx.lineTo(19, -2);
    ctx.lineTo(15, 0);
    ctx.fill();
    ctx.restore();
  }

  // Draw eagle
  function drawEagle(x, y, diving, inWater, inv) {
    if (inv > 0 && Math.floor(inv / 5) % 2 === 0) return; // blink when invincible
    ctx.save();
    ctx.translate(x, y);
    if (diving || inWater) ctx.rotate(Math.PI / 2); // point downward
    // body
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    // wings
    const wSpread = (diving || inWater) ? 18 : 22;
    ctx.fillStyle = '#6d2f00';
    // left wing
    ctx.beginPath();
    ctx.moveTo(-8, -2);
    ctx.bezierCurveTo(-20, -wSpread, -32, -wSpread + 5, -26, -2);
    ctx.closePath();
    ctx.fill();
    // right wing
    ctx.beginPath();
    ctx.moveTo(-8, 2);
    ctx.bezierCurveTo(-20, wSpread, -32, wSpread - 5, -26, 2);
    ctx.closePath();
    ctx.fill();
    // tail feathers
    ctx.fillStyle = '#5a2000';
    ctx.beginPath();
    ctx.moveTo(18, -5);
    ctx.lineTo(28, -8);
    ctx.lineTo(27, 0);
    ctx.lineTo(28, 8);
    ctx.lineTo(18, 5);
    ctx.closePath();
    ctx.fill();
    // white head
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.ellipse(-16, 0, 10, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // eye
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(-19, -2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-18.5, -2.5, 0.8, 0, Math.PI * 2);
    ctx.fill();
    // beak
    ctx.fillStyle = '#f5c518';
    ctx.beginPath();
    ctx.moveTo(-24, -1);
    ctx.lineTo(-30, 1);
    ctx.lineTo(-24, 3);
    ctx.closePath();
    ctx.fill();
    // claws (when diving)
    if (diving || inWater) {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      [-5, 0, 5].forEach(offset => {
        ctx.beginPath();
        ctx.moveTo(-16 + offset, 10);
        ctx.lineTo(-16 + offset, 17);
        ctx.stroke();
      });
    }
    ctx.restore();
  }

  // Draw fish
  function drawFish(x, y, dir, size, type, wiggle) {
    const colors = [
      ['#ff8c00','#ff4500'], // orange
      ['#ffd700','#ffa500'], // gold
      ['#00bcd4','#0097a7']  // blue
    ];
    ctx.save();
    ctx.translate(x, y);
    if (dir > 0) ctx.scale(-1, 1);
    const wag = Math.sin(wiggle) * 4;
    // tail
    ctx.fillStyle = colors[type][1];
    ctx.beginPath();
    ctx.moveTo(size * 0.6, wag);
    ctx.lineTo(size * 1.2, -size * 0.45 + wag);
    ctx.lineTo(size * 1.2, size * 0.45 + wag);
    ctx.closePath();
    ctx.fill();
    // body
    ctx.fillStyle = colors[type][0];
    ctx.beginPath();
    ctx.ellipse(0, 0, size * 0.55, size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-size * 0.28, -size * 0.05, size * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-size * 0.3, -size * 0.05, size * 0.06, 0, Math.PI * 2);
    ctx.fill();
    // fin
    ctx.fillStyle = colors[type][1];
    ctx.beginPath();
    ctx.moveTo(-size * 0.1, -size * 0.25);
    ctx.lineTo(size * 0.2, -size * 0.25);
    ctx.lineTo(size * 0.15, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Draw seaweed
  function drawSeaweed(x, sway, segments, h) {
    const baseY = H;
    const segH = h / segments;
    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    for (let i = 0; i < segments; i++) {
      const cy = baseY - (i + 0.5) * segH;
      const bx = x + Math.sin(sway + i * 1.2) * 10;
      ctx.lineTo(bx, cy);
    }
    ctx.stroke();
    // leaf blobs
    ctx.fillStyle = '#388e3c';
    for (let i = 0; i < segments; i++) {
      const ly = baseY - i * segH - segH * 0.8;
      const lx = x + Math.sin(sway + i * 1.2) * 10;
      ctx.beginPath();
      ctx.ellipse(lx + 7, ly, 7, 4, 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(lx - 7, ly - 4, 6, 3, -0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw crocodile
  function drawCroc(x, y, dir, mouthOpen) {
    ctx.save();
    ctx.translate(x, y);
    if (dir < 0) ctx.scale(-1, 1);
    // body
    ctx.fillStyle = '#33691e';
    ctx.beginPath();
    ctx.ellipse(0, 2, 38, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // bumps on back
    ctx.fillStyle = '#558b2f';
    for (let i = -20; i <= 20; i += 10) {
      ctx.beginPath();
      ctx.ellipse(i, -8, 5, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // tail
    ctx.fillStyle = '#33691e';
    ctx.beginPath();
    ctx.moveTo(32, 0);
    ctx.lineTo(52, -6);
    ctx.lineTo(48, 6);
    ctx.closePath();
    ctx.fill();
    // lower jaw (static)
    ctx.fillStyle = '#4caf50';
    ctx.beginPath();
    ctx.moveTo(-38, 2);
    ctx.lineTo(-18, 2);
    ctx.lineTo(-10, 14);
    ctx.lineTo(-40, 10);
    ctx.closePath();
    ctx.fill();
    // upper jaw (opens)
    ctx.save();
    ctx.translate(-28, 0);
    ctx.rotate(-mouthOpen * 0.4);
    ctx.fillStyle = '#66bb6a';
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(10, 0);
    ctx.lineTo(2, -12);
    ctx.lineTo(-12, -10);
    ctx.closePath();
    ctx.fill();
    // teeth
    ctx.fillStyle = '#fff';
    for (let t = -8; t <= 8; t += 5) {
      ctx.beginPath();
      ctx.moveTo(t, 0);
      ctx.lineTo(t + 2, -5);
      ctx.lineTo(t + 4, 0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    // eye
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.ellipse(-15, -10, 6, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a237e';
    ctx.beginPath();
    ctx.arc(-15, -10, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ─── Draw Background ─────────────────────────────────────
  function drawBackground(t) {
    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, WATER_Y);
    skyGrad.addColorStop(0, '#63b3ed');
    skyGrad.addColorStop(1, '#90cdf4');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, WATER_Y);

    // Sun
    ctx.save();
    ctx.shadowColor = 'rgba(255,220,50,0.6)';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffe066';
    ctx.beginPath();
    ctx.arc(W - 60, 50, 26, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Clouds
    clouds.forEach(c => drawCloud(c.x, c.y, c.w, c.h));

    // Water body gradient
    const waterGrad = ctx.createLinearGradient(0, WATER_Y, 0, H);
    waterGrad.addColorStop(0, '#1565c0');
    waterGrad.addColorStop(0.3, '#1976d2');
    waterGrad.addColorStop(1, '#0d47a1');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, WATER_Y, W, H - WATER_Y);

    // Water surface wave
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let wx = 0; wx <= W; wx += 4) {
      const wy = WATER_Y + Math.sin((wx * 0.03) + t * 0.04) * 5 + Math.sin((wx * 0.07) + t * 0.06) * 3;
      wx === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
    }
    ctx.stroke();

    // Subtle light rays in water
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#90caf9';
    for (let r = 0; r < 5; r++) {
      const rx = 60 + r * 90 + Math.sin(t * 0.015 + r) * 20;
      ctx.beginPath();
      ctx.moveTo(rx, WATER_Y);
      ctx.lineTo(rx - 30, H);
      ctx.lineTo(rx + 30, H);
      ctx.closePath();
