<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园迷宫大冒险 🏫</title>
<style>
  /* 全局样式 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* 游戏标题 */
  #title {
    color: white;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  /* 状态栏 */
  #hud {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.9);
    padding: 8px 20px;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    align-items: center;
    font-size: 16px;
    font-weight: bold;
  }
  #hud span { display: flex; align-items: center; gap: 4px; }
  .heart { color: #e74c3c; font-size: 20px; }
  .key-icon { color: #f39c12; font-size: 18px; }
  .level-icon { color: #3498db; font-size: 18px; }

  /* 游戏画布容器 */
  #game-container {
    position: relative;
    border: 4px solid rgba(255,255,255,0.8);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  canvas {
    display: block;
    background: #f0f8e8;
  }

  /* 消息提示 */
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 20px 30px;
    border-radius: 16px;
    text-align: center;
    font-size: 20px;
    display: none;
    z-index: 100;
    border: 3px solid #f1c40f;
    min-width: 260px;
  }
  #message h2 { font-size: 28px; margin-bottom: 10px; }
  #message p { font-size: 15px; margin-bottom: 14px; color: #ddd; }
  #message button {
    background: linear-gradient(135deg, #f1c40f, #e67e22);
    border: none;
    color: white;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.1s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }
  #message button:hover { transform: scale(1.05); }

  /* 提示牌弹窗 */
  #hint-popup {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff9c4;
    color: #333;
    padding: 10px 20px;
    border-radius: 10px;
    border: 2px solid #f1c40f;
    font-size: 14px;
    display: none;
    z-index: 99;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    max-width: 300px;
  }

  /* 操作说明 */
  #controls-hint {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    margin-top: 6px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="title">🏫 校园迷宫大冒险</div>

<!-- 状态栏 HUD -->
<div id="hud">
  <span><span class="heart">❤️</span> 生命：<span id="lives-display">❤️❤️❤️</span></span>
  <span><span class="key-icon">🔑</span> 钥匙：<span id="keys-display">0/5</span></span>
  <span><span class="level-icon">⭐</span> 关卡：<span id="level-display">1</span></span>
</div>

<!-- 游戏容器 -->
<div id="game-container">
  <canvas id="gameCanvas" width="560" height="420"></canvas>
  
  <!-- 消息弹窗 -->
  <div id="message">
    <h2 id="msg-title">🎉 过关！</h2>
    <p id="msg-body">你找到了所有钥匙！</p>
    <button id="msg-btn" onclick="handleMessageBtn()">继续</button>
  </div>

  <!-- 提示牌弹窗 -->
  <div id="hint-popup" id="hint-popup">💡 <span id="hint-text"></span></div>
</div>

<div id="controls-hint">⬆️⬇️⬅️➡️ 方向键移动 | 走到提示牌 📋 旁边查看提示</div>

<script>
// ============================================================
// 游戏主程序 - 校园迷宫大冒险
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 格子大小（每个格子 28x28 像素）
const TILE = 28;
const COLS = 20; // 列数
const ROWS = 15; // 行数

// 格子类型常量
const EMPTY = 0;
const WALL  = 1;
const KEY   = 2;
const DOOR  = 3;
const SIGN  = 4; // 提示牌

// 游戏状态
let gameState = {
  level: 1,
  lives: 3,
  keysCollected: 0,
  totalKeys: 5,
  invincible: false,      // 被打后短暂无敌
  invincibleTimer: 0,
  gameOver: false,
  levelCleared: false,
  messageShown: false
};

// 当前关卡地图（数字矩阵）
let currentMap = [];

// 玩家
let player = {};

// 老师（巡逻敌人）
let teachers = [];

// 钥匙列表
let keys = [];

// 提示牌列表
let signs = [];

// 终点门
let door = {};

// 提示牌显示计时器
let hintTimer = 0;

// 动画帧计数器（用于角色动画）
let frameCount = 0;

// ============================================================
// 三个关卡的地图定义
// W=墙 .=空地 K=钥匙 D=门 S=提示牌 P=玩家出生点 T=老师出生点
// ============================================================

// 把字符串地图转换为数字地图
function parseMap(strMap) {
  let result = { map: [], player: null, teachers: [], keys: [], signs: [], door: null };
  for (let r = 0; r < strMap.length; r++) {
    result.map.push([]);
    for (let c = 0; c < strMap[r].length; c++) {
      let ch = strMap[r][c];
      if (ch === 'W') { result.map[r].push(WALL); }
      else if (ch === 'K') { result.map[r].push(KEY);  result.keys.push({x:c, y:r, collected:false}); }
      else if (ch === 'D') { result.map[r].push(DOOR); result.door = {x:c, y:r}; }
      else if (ch === 'S') { result.map[r].push(SIGN); result.signs.push({x:c, y:r}); }
      else if (ch === 'P') { result.map[r].push(EMPTY); result.player = {x:c, y:r}; }
      else if (ch === 'T') { result.map[r].push(EMPTY); result.teachers.push({x:c, y:r, dir:0, moveTimer:0}); }
      else { result.map[r].push(EMPTY); }
    }
  }
  return result;
}

// ============================================================
// 关卡地图数据（20列 x 15行）
// ============================================================

// 第1关：简单迷宫，老师少
const LEVEL1_STR = [
  'WWWWWWWWWWWWWWWWWWWW',
  'WP.......W....K....W',
  'W.WWWWW..W.WWWWW..WW',
  'W.W...W..W.W...W...W',
  'W.W.K.W....W.S.W...W',
  'W.W...WWWWWW...W...W',
  'W.WWWWW....WWWWW...W',
  'W.......T..........W',
  'WWWWWWW.WWWWW.WWWWWW',
  'W.K....W.....W.....W',
  'W.WWWW.W.WWW.W.WWW.W',
  'W...........S......W',
  'W.WWWW.WWWWW.WWW...W',
  'W...K......K.....D.W',
  'WWWWWWWWWWWWWWWWWWWW'
];

// 第2关：更复杂，2个老师
const LEVEL2_STR = [
  'WWWWWWWWWWWWWWWWWWWW',
  'WP..W......W...K...W',
  'W...W.WWWW.W.WWWWW.W',
  'W.K.W.W..W.W.W.....W',
  'W...W.W.KW.W.W.WWW.W',
  'WWWWW.W..W...W.W.W.W',
  'W.....WWWWWWWW.W.W.W',
  'W.WWW.T........W.W.W',
  'W.W.W.WWWWWWWW.W.W.W',
  'W.W.W.W....K.W.W...W',
  'W.W.W.W.WW..W.....WW',
  'W...W...WW.WWWWWW..W',
  'WWWWWWWWWW.........W',
  'WT.K.......W.S...D.W',
  'WWWWWWWWWWWWWWWWWWWW'
];

// 第3关：最难，3个老师
const LEVEL3_STR = [
  'WWWWWWWWWWWWWWWWWWWW',
  'WP.W...W...W.......W',
  'W..W.W.W.W.W.WWWWWWW',
  'W..W.W...W.W.W.....W',
  'W.KW.WWWWW.W.W.K...W',
  'W..W.......W.W.WWWWW',
  'W..WWWWWWW.W.W.....W',
  'W..W...T.W.W.W.WWW.W',
  'W..W.WWW.W.W.W.W.W.W',
  'W.KW.W.K.W...W.W.W.W',
  'W..W.W...WWWWW.W.W.W',
  'W..W.WWWWW.....W.W.W',
  'WT.W...W...WWWWW.S.W',
  'W..W.T.W.K.........W',
  'WWWWWWWWWWWWWWWDWWWW'
];

const ALL_LEVELS = [LEVEL1_STR, LEVEL2_STR, LEVEL3_STR];

// 提示牌内容
const SIGN_HINTS = [
  ['找到5把🔑才能打开图书馆大门！加油！', '小心老师巡逻，碰到会扣血哦！'],
  ['你进入了第2关！老师变多了，要更小心！', '钥匙藏在角落里，仔细找找吧！'],
  ['最终关卡！这里有3位老师在巡逻！', '你快成功了！找到所有钥匙，冲向大门！']
];

// ============================================================
// 初始化关卡
// ============================================================
function initLevel(levelNum) {
  gameState.keysCollected = 0;
  gameState.levelCleared = false;
  gameState.invincible = false;
  gameState.invincibleTimer = 0;

  let levelIndex = levelNum - 1;
  let data = parseMap(ALL_LEVELS[levelIndex]);

  currentMap = data.map;
  keys = data.keys;
  signs = data.signs;
  door = data.door;

  // 初始化玩家
  player = {
    x: data.player.x,
    y: data.player.y,
    moving: false,
    moveDir: 0,    // 0=下 1=左 2=右 3=上（用于动画）
    animFrame: 0
  };

  // 初始化老师（巡逻模式）
  teachers = data.teachers.map((t, i) => ({
    x: t.x,
    y: t.y,
    startX: t.x,
    startY: t.y,
    path: [],         // 巡逻路径
    pathIndex: 0,
    moveTimer: 0,
    moveDelay: 28 + i * 8,  // 不同老师速度略有不同
    animFrame: 0
  }));

  // 为每个老师生成巡逻路径
  teachers.forEach(t => generatePatrolPath(t));

  updateHUD();
  hideMessage();
}

// ============================================================
// 生成巡逻路径（让老师沿一条固定路线来回走）
// ============================================================
function generatePatrolPath(teacher) {
  // 从老师起点出发，尝试向右或向下找一条路
  let path = [{x: teacher.x, y: teacher.y}];
  
  // 尝试向右走最多6步
  for (let i = 1; i <= 6; i++) {
    let nx = teacher.x + i;
    if (nx < COLS && currentMap[teacher.y][nx] === EMPTY) {
      path.push({x: nx, y: teacher.y});
    } else break;
  }
  // 再向下走最多4步
  let lastX = path[path.length-1].x;
  let lastY = teacher.y;
  for (let i = 1; i <= 4; i++) {
    let ny = lastY + i;
    if (ny < ROWS && currentMap[ny][lastX] === EMPTY) {
      path.push({x: lastX, y: ny});
    } else break;
  }

  // 如果路径太短，就只做左右来回
  if (path.length < 2) {
    for (let i = 1; i <= 3; i++) {
      let nx = teacher.x - i;
      if (nx >= 0 && currentMap[teacher.y][nx] === EMPTY) {
        path.push({x: nx, y: teacher.y});
      } else break;
    }
  }

  // 把路径设为来回（去程+返程）
  let fullPath = [...path];
  for (let i = path.length - 2; i >= 0; i--) {
    fullPath.push(path[i]);
  }

  teacher.path = fullPath;
  teacher.pathIndex = 0;
}

// ============================================================
// 键盘输入处理
// ============================================================
let keysDown = {};
document.addEventListener('keydown', e => {
  // 阻止方向键滚动页面
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
  }
  keysDown[e.key] = true;
});
document.addEventListener('keyup', e => { keysDown[e.key] = false; });

// 移动冷却（防止移动太快）
let moveCooldown = 0;

function handleInput() {
  if (moveCooldown > 0) { moveCooldown--; return; }
  if (gameState.messageShown) return;

  let dx = 0, dy = 0;
  if (keysDown['ArrowUp'])    { dy = -1; player.moveDir = 3; }
  if (keysDown['ArrowDown'])  { dy =  1; player.moveDir = 0; }
  if (keysDown['ArrowLeft'])  { dx = -1; player.moveDir = 1; }
  if (keysDown['ArrowRight']) { dx =  1; player.moveDir = 2; }

  if (dx === 0 && dy === 0) return;

  let nx = player.x + dx;
  let ny = player.y + dy;

  // 边界和墙壁检测
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  if (currentMap[ny][nx] === WALL) return;

  // 门的检测（只有集满钥匙才能走进去）
  if (currentMap[ny][nx] === DOOR) {
    if (gameState.keysCollected >= gameState.totalKeys) {
      // 过关！
      levelCleared();
    }
    return;
  }

  // 移动玩家
  player.x = nx;
  player.y = ny;
  moveCooldown = 8; // 移动冷却帧数

  // 捡钥匙
  keys.forEach(k => {
    if (!k.collected && k.x === player.x && k.y === player.y) {
      k.collected = true;
      currentMap[k.y][k.x] = EMPTY;
      gameState.keysCollected++;
      updateHUD();
      // 如果集满钥匙，显示提示
      if (gameState.keysCollected >= gameState.totalKeys) {
        showHint('🎉 集齐5把钥匙！快去找图书馆大门 🚪！');
      }
    }
  });

  // 走到提示牌旁边显示提示
  signs.forEach((s, i) => {
    if (s.x === player.x && s.y === player.y) {
      let hints = SIGN_HINTS[gameState.level - 1];
      let hintText = hints[i % hints.length];
      showHint(hintText);
    }
  });
}

// ============================================================
// 老师移动
// ============================================================
function updateTeachers() {
  teachers.forEach(t => {
    t.moveTimer++;
    if (t.moveTimer >= t.moveDelay) {
      t.moveTimer = 0;
      // 沿巡逻路径移动
      if (t.path.length > 0) {
        t.pathIndex = (t.pathIndex + 1) % t.path.length;
        let target = t.path[t.pathIndex];
        t.x = target.x;
        t.y = target.y;
        t.animFrame = (t.animFrame + 1) % 4;
      }
    }

    // 碰撞检测：老师是否碰到玩家
    if (t.x === player.x && t.y === player.y) {
      if (!gameState.invincible) {
        hitByTeacher();
      }
    }
  });
}

// ============================================================
// 被老师碰到
// ============================================================
function hitByTeacher() {
  gameState.lives--;
  gameState.invincible = true;
  gameState.invincibleTimer = 120; // 2秒无敌时间
  updateHUD();

  if (gameState.lives <= 0) {
    // 游戏结束
    gameOver();
  } else {
    showHint('😱 被老师抓到了！还有 ' + gameState.lives + ' 条命！');
    // 玩家回到出生点
    let data = parseMap(ALL_LEVELS[gameState.level - 1]);
    player.x = data.player.x;
    player.y = data.player.y;
  }
}

// ============================================================
// 过关
// ============================================================
function levelCleared() {
  gameState.levelCleared = true;
  gameState.messageShown = true;
  if (gameState.level >= 3) {
    showMessage('🎊 恭喜通关！', '你找到了所有钥匙，成功开启图书馆大门！\n你完成了全部3关！太棒了！', '重新开始');
  } else {
    showMessage('🎉 过关！', '第 ' + gameState.level + ' 关完成！\n你找到了所有钥匙，成功开启图书馆大门！', '进入第 ' + (gameState.level + 1) + ' 关');
  }
}

// ============================================================
// 游戏结束
// ============================================================
function gameOver() {
  gameState.gameOver = true;
  gameState.messageShown = true;
  showMessage('💔 游戏结束', '被老师抓到太多次了...\n下次一定要小心绕过老师哦！', '重新开始');
}

// ============================================================
// 消息弹窗控制
// ============================================================
function showMessage(title, body, btnText) {
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-body').textContent = body;
  document.getElementById('msg-btn').textContent = btnText;
  document.getElementById('message').style.display = 'block';
}

function hideMessage() {
  document.getElementById('message').style.display = 'none';
  gameState.messageShown = false;
}

// 按钮点击处理
function handleMessageBtn() {
  if (gameState.gameOver) {
    // 重新开始全部
    gameState.lives = 3;
    gameState.level = 1;
    gameState.gameOver = false;
    initLevel(1);
  } else if (gameState.levelCleared) {
    if (gameState.level >= 3) {
      // 通关后重新开始
      gameState.lives = 3;
      gameState.level = 1;
      initLevel(1);
    } else {
      // 下一关
      gameState.level++;
      initLevel(gameState.level);
    }
  }
}

// ============================================================
// 提示牌弹窗
// ============================================================
function showHint(text) {
  document.getElementById('hint-text').textContent = text;
  document.getElementById('hint-popup').style.display = 'block';
  hintTimer = 180; // 显示3秒
}

// ============================================================
// 更新状态栏
// ============================================================
function updateHUD() {
  // 生命值显示
  let heartsStr = '';
  for (let i = 0; i < gameState.lives; i++) heartsStr += '❤️';
  for (let i = gameState.lives; i < 3; i++) heartsStr += '🖤';
  document.getElementById('lives-display').textContent = heartsStr;

  // 钥匙显示
  document.getElementById('keys-display').textContent = gameState.keysCollected + '/' + gameState.totalKeys;

  // 关卡显示
  document.getElementById('level-display').textContent = gameState.level;
}

// ============================================================
// 绘制函数
// ============================================================

// 颜色方案
const COLORS = {
  wall:       '#4a5568',
  wallTop:    '#718096',
  wallDecor:  '#2d3748',
  floor:      '#f0f8e8',
  floorAlt:   '#e8f4d8',
  doorLocked: '#a0522d',
  doorOpen:   '#228b22',
  doorFrame:  '#8b4513',
  keyColor:   '#f1c40f',
  keyGlow:    '#ffd700',
  signBg:     '#fff9c4',
  signBorder: '#f1c40f',
  hintColor:  '#333',
};

// 绘制地图
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let x = c * TILE;
      let y = r * TILE;
      let tile = currentMap[r][c];

      if (tile === WALL) {
        // 砖块墙壁
        ctx.fillStyle = COLORS.wall;
        ctx.fillRect(x, y, TILE, TILE);
        // 砖纹
        ctx.fillStyle = COLORS.wallTop;
        ctx.fillRect(x+1, y+1, TILE-2, 6);
        ctx.fillStyle = COLORS.wallDecor;
        ctx.fillRect(x, y+8, TILE, 1);
        ctx.fillRect(x, y+16, TILE, 1);
      } else {
        // 地板（棋盘格）
        ctx.fillStyle = (r + c) % 2 === 0 ? COLORS.floor : COLORS.floorAlt;
        ctx.fillRect(x, y, TILE, TILE);
      }

      // 绘制门
      if (tile === DOOR) {
        let allKeys = gameState.keysCollected >= gameState.totalKeys;
        // 门框
        ctx.fillStyle = COLORS.doorFrame;
        ctx.fillRect(x, y, TILE, TILE);
        // 门板
        ctx.fillStyle = allKeys ? COLORS.doorOpen : COLORS.doorLocked;
        ctx.fillRect(x+3, y+2, TILE-6, TILE-2);
        // 门把手
        ctx.fillStyle = allKeys ? '#ffd700' : '#999';
        ctx.beginPath();
        ctx.arc(x + TILE - 8, y + TILE/2, 3, 0, Math.PI*2);
        ctx.fill();
        // 门上的小窗户
        ctx.fillStyle = allKeys ? '#90ee90' : '#87ceeb';
        ctx.fillRect(x+6, y+5, TILE-12, 8);
        // 文字
        ctx.fillStyle = 'white';
        ctx.font = 'bold 9px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(allKeys ? '开!' : '锁', x + TILE/2, y + TILE - 5);
      }

      // 绘制提示牌
      if (tile === SIGN) {
        let sx = x + 4;
        let sy = y + 4;
        let sw = TILE - 8;
        let sh = TILE - 8;
        ctx.fillStyle = COLORS.signBg;
        ctx.strokeStyle = COLORS.signBorder;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(sx, sy, sw, sh, 3);
        ctx.fill();
        ctx.stroke();
        // 写"📋"
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('📋', x + TILE/2, y + TILE/2 + 5);
      }
    }
  }
}

// 绘制钥匙（带动画）
function drawKeys() {
  keys.forEach(k => {
    if (k.collected) return;
    let x = k.x * TILE + TILE/2;
    let y = k.y * TILE + TILE/2;
    // 浮动动画
    let bob = Math.sin(frameCount * 0.08) * 2;
    // 光晕
    ctx.shadowColor = COLORS.keyGlow;
    ctx.shadowBlur = 10;
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🔑', x, y + bob + 8);
    ctx.shadowBlur = 0;
  });
}
