<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保险经纪人的日子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
  #gameContainer { position: relative; width: 800px; height: 500px; }

  /* Start screen overlay */
  #startScreen {
    position: absolute; z-index: 100; width: 100%; height: 100%;
    background: linear-gradient(135deg, #87CEEB 0%, #FDB97D 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 12px; overflow: hidden;
  }
  #startScreen h1 { font-size: 36px; color: #2c3e50; text-shadow: 2px 2px 0 #fff; margin-bottom: 8px; }
  #startScreen .subtitle { font-size: 16px; color: #34495e; margin-bottom: 16px; }
  .rulesBox {
    background: rgba(255,255,255,0.85); border-radius: 12px; padding: 14px 20px;
    margin-bottom: 18px; max-width: 480px; width: 90%; border: 2px solid #f39c12;
  }
  .rulesBox h3 { color: #e74c3c; margin-bottom: 8px; font-size: 15px; }
  .rulesBox .good { color: #27ae60; font-size: 13px; margin-bottom: 4px; }
  .rulesBox .bad  { color: #e74c3c; font-size: 13px; margin-bottom: 4px; }
  .rulesBox .note { color: #7f8c8d; font-size: 12px; margin-top: 6px; }
  #startBtn {
    background: linear-gradient(135deg, #f39c12, #e74c3c); color: white;
    border: none; border-radius: 30px; padding: 14px 40px; font-size: 20px;
    cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.1s;
  }
  #startBtn:hover { transform: scale(1.05); }

  /* Canvas */
  #gameCanvas { position: absolute; z-index: 1; display: none; border-radius: 12px; }

  /* HUD */
  #hud {
    position: absolute; z-index: 50; top: 8px; left: 0; width: 100%;
    display: none; justify-content: space-around; align-items: center;
    pointer-events: none;
  }
  .hudBox {
    background: rgba(0,0,0,0.55); color: #fff; border-radius: 8px;
    padding: 5px 14px; font-size: 15px; font-weight: bold;
  }
  .hudBox span { color: #FFD700; }

  /* Overlay screens */
  .overlayScreen {
    position: absolute; z-index: 200; width: 100%; height: 100%;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 12px;
  }
  #cutsceneScreen { background: linear-gradient(135deg, #6c5ce7, #fd79a8); }
  #failScreen     { background: linear-gradient(135deg, #636e72, #2d3436); }
  #treasureScreen { background: linear-gradient(135deg, #f9ca24, #f0932b); }

  .overlayScreen h2 { color: white; font-size: 30px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); }
  .overlayScreen p  { color: rgba(255,255,255,0.9); font-size: 16px; margin-bottom: 20px; text-align: center; padding: 0 20px; }
  .bigEmoji { font-size: 80px; margin-bottom: 10px; animation: bounce 0.6s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-15px) scale(1.1); } }

  .progressBarWrap { width: 300px; height: 20px; background: rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .progressBarFill { height: 100%; background: #fff; border-radius: 10px; transition: width 0.05s linear; }

  .overlayBtn {
    background: rgba(255,255,255,0.25); color: white; border: 2px solid white;
    border-radius: 25px; padding: 10px 28px; font-size: 16px; cursor: pointer; transition: background 0.2s;
  }
  .overlayBtn:hover { background: rgba(255,255,255,0.45); }

  /* Tooltip */
  #tooltip {
    position: absolute; z-index: 300; background: rgba(0,0,0,0.75); color: #fff;
    border-radius: 6px; padding: 4px 10px; font-size: 13px; pointer-events: none;
    display: none; white-space: nowrap;
  }
</style>
</head>
<body>
<div id="gameContainer">

  <!-- Start Screen -->
  <div id="startScreen">
    <h1>🏙️ 保险经纪人的日子</h1>
    <p class="subtitle">洛杉矶街头 — 点击拉客，完成业绩！</p>
    <div class="rulesBox">
      <h3>📋 游戏规则</h3>
      <div class="good">✅ 好目标（+1分）：商人💼 · 上班族📋 · 家庭👨‍👩‍👧 · 情侣💕</div>
      <div class="bad">❌ 坏目标（-1分）：小孩🧸 · 游客🧳 · 乞丐🎒</div>
      <div class="note">每关需在30秒内得5分才能过关，共3关</div>
    </div>
    <button id="startBtn">🚀 开始游戏！</button>
  </div>

  <!-- Game Canvas -->
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hudBox">🏆 第 <span id="hudLevel">1</span> 关</div>
    <div class="hudBox">⭐ 得分: <span id="hudScore">0</span> / 5</div>
    <div class="hudBox">⏱️ <span id="hudTimer">30</span> 秒</div>
  </div>

  <!-- Cutscene Screen -->
  <div id="cutsceneScreen" class="overlayScreen">
    <div class="bigEmoji" id="cutsceneEmoji">🍔</div>
    <h2 id="cutsceneTitle">过关！休息一下~</h2>
    <p id="cutsceneText">第一关完成！去吃个汉堡庆祝！</p>
    <div class="progressBarWrap"><div class="progressBarFill" id="cutsceneBar" style="width:100%"></div></div>
    <button class="overlayBtn" id="cutsceneSkipBtn">跳过 ▶</button>
  </div>

  <!-- Treasure Screen (Level 3 win) -->
  <div id="treasureScreen" class="overlayScreen">
    <div class="bigEmoji">💰</div>
    <h2>🎉 恭喜通关！</h2>
    <p>三关全过！你成为洛杉矶最强保险经纪人！<br>数钱数到手软！💸💸💸</p>
    <div class="progressBarWrap"><div class="progressBarFill" id="treasureBar" style="width:100%"></div></div>
    <button class="overlayBtn" id="treasureNextBtn">继续 ▶</button>
  </div>

  <!-- Fail Screen -->
  <div id="failScreen" class="overlayScreen">
    <div class="bigEmoji">🌿</div>
    <h2>今天颗粒无收...</h2>
    <p>坐在路边吃草 🌿<br>明天再努力吧！</p>
    <div class="progressBarWrap"><div class="progressBarFill" id="failBar" style="width:100%"></div></div>
    <button class="overlayBtn" id="failRetryBtn">再试一次 🔄</button>
  </div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // ===================== ELEMENT REFS =====================
  const canvas       = document.getElementById('gameCanvas');
  const ctx          = canvas.getContext('2d');
  const startScreen  = document.getElementById('startScreen');
  const hud          = document.getElementById('hud');
  const cutsceneScreen = document.getElementById('cutsceneScreen');
  const treasureScreen = document.getElementById('treasureScreen');
  const failScreen   = document.getElementById('failScreen');
  const tooltip      = document.getElementById('tooltip');
  const hudLevel     = document.getElementById('hudLevel');
  const hudScore     = document.getElementById('hudScore');
  const hudTimer     = document.getElementById('hudTimer');

  // ===================== GAME STATE =====================
  let level = 1;
  let score = 0;
  let timeLeft = 30;
  let gameRunning = false;
  let timerInterval = null;
  let animFrameId = null;
  let persons = [];
  let floatingTexts = [];
  let spawnTimer = 0;
  let cutsceneTimeout = null;

  // ===================== PERSON TYPES =====================
  const personTypes = [
    { id:'businessman', label:'商人', good:true,  color:'#1a3a6b', accent:'#2980b9' },
    { id:'worker',      label:'上班族', good:true, color:'#2471a3', accent:'#85c1e9' },
    { id:'family',      label:'家庭',  good:true,  color:'#1e8449', accent:'#58d68d' },
    { id:'couple',      label:'情侣',  good:true,  color:'#6c3483', accent:'#c39bd3' },
    { id:'kid',         label:'小孩',  good:false, color:'#c0392b', accent:'#f1948a' },
    { id:'tourist',     label:'游客',  good:false, color:'#d35400', accent:'#f0b27a' },
    { id:'beggar',      label:'乞丐',  good:false, color:'#616a6b', accent:'#aab7b8' },
  ];

  // ===================== DRAW HELPERS =====================
  // Draw a person at (cx, baseY), scale = height multiplier
  function drawPerson(cx, baseY, type, walkPhase, scale) {
    scale = scale || 1;
    const H = 90 * scale;   // full height
    const headR = 12 * scale;
    const bodyH = 30 * scale;
    const legH  = 28 * scale;
    const armLen = 20 * scale;
    const shoulderY = baseY - legH - bodyH;
    const neckY     = shoulderY - 2 * scale;
    const headY     = neckY - headR;

    // Walking leg animation
    const legSwing = Math.sin(walkPhase) * 14 * scale;

    ctx.lineWidth = 2 * scale;
    ctx.lineCap = 'round';

    // --- Legs ---
    ctx.strokeStyle = (type.id === 'kid') ? '#8e1a0e' : '#2c3e50';
    ctx.beginPath();
    ctx.moveTo(cx, shoulderY + bodyH);
    ctx.lineTo(cx - 7 * scale + legSwing, baseY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, shoulderY + bodyH);
    ctx.lineTo(cx + 7 * scale - legSwing, baseY);
    ctx.stroke();

    // --- Body ---
    ctx.fillStyle = type.color;
    ctx.beginPath();
    ctx.roundRect(cx - 11*scale, shoulderY, 22*scale, bodyH, 4*scale);
    ctx.fill();

    // --- Arms ---
    const armSwing = Math.cos(walkPhase) * 10 * scale;
    ctx.strokeStyle = type.color;
    ctx.lineWidth = 5 * scale;
    // Left arm
    ctx.beginPath();
    ctx.moveTo(cx - 10*scale, shoulderY + 4*scale);
    ctx.lineTo(cx - 10*scale - armLen, shoulderY + 14*scale + armSwing);
    ctx.stroke();
    // Right arm
    ctx.beginPath();
    ctx.moveTo(cx + 10*scale, shoulderY + 4*scale);
    ctx.lineTo(cx + 10*scale + armLen*0.3, shoulderY + 14*scale - armSwing);
    ctx.stroke();

    // --- Head ---
    ctx.fillStyle = '#FDBCB4'; // skin
    ctx.beginPath();
    ctx.arc(cx, headY, headR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c9a090';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // --- Eyes ---
    ctx.fillStyle = '#2c3e50';
    ctx.beginPath(); ctx.arc(cx - 4*scale, headY - 1*scale, 1.8*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 4*scale, headY - 1*scale, 1.8*scale, 0, Math.PI*2); ctx.fill();

    // --- Smile ---
    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 1.2*scale;
    ctx.beginPath();
    ctx.arc(cx, headY + 2*scale, 4*scale, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // ---- TYPE-SPECIFIC ACCESSORIES ----
    if (type.id === 'businessman') {
      // Briefcase in right hand
      let bx = cx + 14*scale + armLen*0.3;
      let by = shoulderY + 18*scale;
      ctx.fillStyle = '#784212';
      ctx.fillRect(bx, by, 14*scale, 10*scale);
      ctx.strokeStyle = '#5d3d1f';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(bx, by, 14*scale, 10*scale);
      // Handle
      ctx.beginPath();
      ctx.moveTo(bx + 4*scale, by);
      ctx.lineTo(bx + 4*scale, by - 4*scale);
      ctx.lineTo(bx + 10*scale, by - 4*scale);
      ctx.lineTo(bx + 10*scale, by);
      ctx.stroke();
      // Hat
      ctx.fillStyle = '#1a252f';
      ctx.fillRect(cx - 14*scale, headY - headR - 12*scale, 28*scale, 12*scale);
      ctx.fillRect(cx - 17*scale, headY - headR, 34*scale, 4*scale);
    }

    if (type.id === 'worker') {
      // Clipboard in right hand
      let bx = cx + 14*scale + armLen*0.3;
      let by = shoulderY + 10*scale;
      ctx.fillStyle = '#f0d9b5';
      ctx.fillRect(bx, by, 12*scale, 16*scale);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(bx + 3*scale, by - 3*scale, 6*scale, 5*scale);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      for (let i=0;i<3;i++) {
        ctx.beginPath();
        ctx.moveTo(bx+2*scale, by+4*scale+i*4*scale);
        ctx.lineTo(bx+10*scale, by+4*scale+i*4*scale);
        ctx.stroke();
      }
    }

    if (type.id === 'family') {
      // Small child beside
      let childX = cx + 20*scale;
      let childScale = scale * 0.55;
      let childH = 90 * childScale;
      let cBaseY = baseY;
      let cLegSwing = Math.sin(walkPhase + 0.5) * 8 * childScale;
      let cShoulderY = cBaseY - 28*childScale - 30*childScale;
      let cNeckY = cShoulderY - 2*childScale;
      let cHeadY = cNeckY - 12*childScale;
      // Child legs
      ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2*childScale;
      ctx.beginPath(); ctx.moveTo(childX, cShoulderY+30*childScale);
      ctx.lineTo(childX-5*childScale+cLegSwing, cBaseY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(childX, cShoulderY+30*childScale);
      ctx.lineTo(childX+5*childScale-cLegSwing, cBaseY); ctx.stroke();
      // Child body
      ctx.fillStyle = '#58d68d';
      ctx.fillRect(childX-9*childScale, cShoulderY, 18*childScale, 30*childScale);
      // Child arms
      ctx.strokeStyle = '#58d68d'; ctx.lineWidth = 4*childScale;
      ctx.beginPath(); ctx.moveTo(childX-9*childScale, cShoulderY+4*childScale);
      ctx.lineTo(childX-9*childScale-14*childScale, cShoulderY+14*childScale); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(childX+9*childScale, cShoulderY+4*childScale);
      ctx.lineTo(childX+9*childScale+6*childScale, cShoulderY+14*childScale); ctx.stroke();
      // Child head
      ctx.fillStyle = '#FDBCB4';
      ctx.beginPath(); ctx.arc(childX, cHeadY, 12*childScale, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#c9a090'; ctx.lineWidth=1; ctx.stroke();
      // Child eyes
      ctx.fillStyle = '#2c3e50';
      ctx.beginPath(); ctx.arc(childX-3*childScale, cHeadY, 1.5*childScale,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(childX+3*childScale, cHeadY, 1.5*childScale,0,Math.PI*2); ctx.fill();
      // Connecting hand
      ctx.strokeStyle = '#FDBCB4'; ctx.lineWidth = 3*scale;
      ctx.beginPath();
      ctx.moveTo(cx - 10*scale, shoulderY + bodyH - 8*scale);
      ctx.lineTo(childX + 9*childScale + 6*childScale, cShoulderY + 14*childScale);
      ctx.stroke();
    }

    if (type.id === 'couple') {
      // Second person (partner) beside
      let px = cx + 22*scale;
      let pSwing = Math.sin(walkPhase + 0.3) * 14 * scale;
      let pShoulderY = baseY - legH - bodyH;
      // Partner legs
      ctx.strokeStyle = '#4a235a'; ctx.lineWidth = 2*scale;
      ctx.beginPath(); ctx.moveTo(px, pShoulderY+bodyH); ctx.lineTo(px-7*scale+pSwing, baseY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px, pShoulderY+bodyH); ctx.lineTo(px+7*scale-pSwing, baseY); ctx.stroke();
      // Partner body
      ctx.fillStyle = '#c39bd3';
      ctx.beginPath(); ctx.roundRect(px-11*scale, pShoulderY, 22*scale, bodyH, 4*scale); ctx.fill();
      // Partner arms
      ctx.strokeStyle = '#c39bd3'; ctx.lineWidth = 5*scale;
      ctx.beginPath(); ctx.moveTo(px-10*scale, pShoulderY+4*scale); ctx.lineTo(px-20*scale, pShoulderY+16*scale+pSwing*0.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px+10*scale, pShoulderY+4*scale); ctx.lineTo(px+13*scale, pShoulderY+16*scale-pSwing*0.4); ctx.stroke();
      // Partner head
      ctx.fillStyle = '#FDBCB4';
      ctx.beginPath(); ctx.arc(px, neckY - headR, headR, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#c9a090'; ctx.lineWidth=1.5; ctx.stroke();
      // Partner eyes
      ctx.fillStyle = '#2c3e50';
      ctx.beginPath(); ctx.arc(px-4*scale, neckY-headR-1*scale, 1.8*scale,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+4*scale, neckY-headR-1*scale, 1.8*scale,0,Math.PI*2); ctx.fill();
      // Holding hands line
      ctx.strokeStyle = '#FDBCB4'; ctx.lineWidth = 3*scale;
      ctx.beginPath();
      ctx.moveTo(cx+10*scale+armLen*0.3, shoulderY+14*scale);
      ctx.lineTo(px-20*scale, pShoulderY+16*scale);
      ctx.stroke();
      // Heart above
      ctx.fillStyle = '#e74c3c'; ctx.font = `${14*scale}px Arial`;
      ctx.fillText('♥', cx+11*scale, shoulderY - 6*scale);
    }

    if (type.id === 'kid') {
      // Teddy bear in arms
      let bx = cx + 10*scale + armLen*0.3;
      let by = shoulderY + 8*scale;
      // Bear body
      ctx.fillStyle = '#c8a46e';
      ctx.beginPath(); ctx.ellipse(bx+6*scale, by+7*scale, 7*scale, 8*scale, 0, 0, Math.PI*2); ctx.fill();
      // Bear head
      ctx.beginPath(); ctx.arc(bx+6*scale, by+1*scale, 6*scale, 0, Math.PI*2); ctx.fill();
      // Bear ears
      ctx.beginPath(); ctx.arc(bx+1*scale, by-4*scale, 3*scale, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx+11*scale, by-4*scale, 3*scale, 0, Math.PI*2); ctx.fill();
      // Bear face
      ctx.fillStyle = '#8b6914';
      ctx.beginPath(); ctx.arc(bx+4*scale, by+1*scale, 1.2*scale,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx+8*scale, by+1*scale, 1.2*scale,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx+6*scale, by+3.5*scale, 2*scale,0,Math.PI*2); ctx.fill();
    }

    if (type.id === 'tourist') {
      // Rolling suitcase being pulled
      let sx = cx + 16*scale; // suitcase behind (to the right if moving left, adjust)
      let sy = baseY - 28*scale;
      // Handle extending up
      ctx.strokeStyle = '#555'; ctx.lineWidth = 2*scale;
      ctx.beginPath();
      ctx.moveTo(cx - 12*scale, shoulderY + 10*scale);
      ctx.lineTo(sx + 5*scale, sy - 18*scale);
      ctx.stroke();
      // Handle top
      ctx.beginPath();
      ctx.moveTo(sx + 2*scale, sy - 18*scale);
      ctx.lineTo(sx + 8*scale, sy - 18*scale);
      ctx.stroke();
      // Suitcase body
      ctx.fillStyle = '#e67e22';
      ctx.fillRect(sx, sy, 20*scale, 24*scale);
      ctx.strokeStyle = '#a04000'; ctx.lineWidth = 1.5*scale;
      ctx.strokeRect(sx, sy, 20*scale, 24*scale);
      // Suitcase stripes
      ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1.5*scale;
      ctx.beginPath(); ctx.moveTo(sx, sy+8*scale); ctx.lineTo(sx+20*scale, sy+8*scale); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, sy+16*scale); ctx.lineTo(sx+20*scale, sy+16*scale); ctx.stroke();
      // Wheels
      ctx.fillStyle = '#2c3e50';
      ctx.beginPath(); ctx.arc(sx+4*scale, baseY-2*scale, 4*scale, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+16*scale, baseY-2*scale, 4*scale, 0, Math.PI*2); ctx.fill();
    }

    if (type.id === 'beggar') {
      // Large backpack on back
      let bx = cx + 10*scale;
      let by = shoulderY - 5*scale;
      // Big overstuffed bag
      ctx.fillStyle = '#4a4a4a';
      ctx.beginPath(); ctx.ellipse(bx+10*scale, by+20*scale, 14*scale, 20*scale, -0.2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2c2c2c'; ctx.lineWidth = 1.5*scale; ctx.stroke();
      // Bag straps
      ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5*scale;
      ctx.beginPath(); ctx.moveTo(bx+2*scale, by+4*scale); ctx.lineTo(cx-3*scale, shoulderY+22*scale); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+12*scale, by+4*scale); ctx.lineTo(cx+3*scale, shoulderY+22*scale); ctx.stroke();
      // Stuff sticking out
      ctx.fillStyle = '#7f8c8d';
      ctx.beginPath(); ctx.ellipse(bx+8*scale, by-2*scale, 5*scale, 5*scale, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx+15*scale, by+2*scale, 4*scale, 4*scale, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  // ===================== BACKGROUND =====================
  function drawBackground() {
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, 300);
    sky.addColorStop(0, '#87CEEB');
    sky.addColorStop(1, '#FDB97D');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, 800, 500);

    // Sun
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(720, 60, 40, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,215,0,0.3)';
    ctx.beginPath(); ctx.arc(720, 60, 55, 0, Math.PI*2); ctx.fill();

    // Clouds (static)
    drawCloud(100, 70, 0.8);
    drawCloud(320, 50, 1.0);
    drawCloud(560, 80, 0.7);

    // Buildings far back
    drawBuilding(30, 280, 80, 170, '#b0c4de');
    drawBuilding(120, 250, 60, 200, '#a9c8d4');
    drawBuilding(190, 260, 90, 190, '#8faabc');
    drawBuilding(290, 230, 70, 220, '#9db8cc');
    drawBuilding(370, 270, 100, 180, '#aab8c2');
    drawBuilding(480, 240, 65, 210, '#95aabd');
    drawBuilding(555, 255, 85, 195, '#8fa8bb');
    drawBuilding(650, 245, 75, 205, '#9db5c8');
    drawBuilding(735, 260, 80, 190, '#a8bfcd');

    // Buildings mid
    drawBuilding(0, 320, 70, 130, '#e8d5b7');
    drawBuilding(80, 310, 55, 140, '#dcc9a8');
    drawBuilding(145, 305, 80, 145, '#e6d4ba');
    drawBuilding(235, 300, 60, 150, '#d9c8a5');
    drawBuilding(305, 315, 75, 135, '#e0ceaf');
    drawBuilding(390, 300, 90, 150, '#d8c7a0');
    drawBuilding(490, 310, 65, 140, '#dcc9a8');
    drawBuilding(565, 305, 80, 145, '#e2d0b2');
    drawBuilding(655, 300, 70, 150, '#d9c8a5');
    drawBuilding(735, 315, 65, 135, '#e0ceaf');

    // Ground
    ctx.fillStyle = '#c8a96e';
    ctx.fillRect(0, 440, 800, 60);
    // Sidewalk
    ctx.fillStyle = '#d4c5a9';
    ctx.fillRect(0, 440, 800, 15);
    // Sidewalk lines
    ctx.strokeStyle = '#b8a890';
    ctx.lineWidth = 1;
    for (let x = 0; x < 800; x += 60) {
      ctx.beginPath(); ctx.moveTo(x, 440); ctx.lineTo(x, 455); ctx.stroke();
    }
    // Road
    ctx.fillStyle = '#555';
    ctx.fillRect(0, 455, 800, 45);
    // Road lines
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3; ctx.setLineDash([30, 20]);
    ctx.beginPath(); ctx.moveTo(0, 478); ctx.lineTo(800, 478); ctx.stroke();
    ctx.setLineDash([]);

    // Palm trees
    drawPalmTree(60, 440);
    drawPalmTree(260, 440);
    drawPalmTree(500, 440);
    drawPalmTree(720, 440);
  }

  function drawCloud(x, y, s) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(x, y, 22*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+28*s, y+5*s, 18*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x-22*s, y+8*s, 15*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+8*s, y+10*s, 20*s, 0, Math.PI*2); ctx.fill();
  }

  function drawBuilding(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
    // Windows
    ctx.fillStyle = 'rgba(255,255,200,0.6)';
    for (let row = 0; row < Math.floor(h/22); row++) {
      for (let col = 0; col < Math.floor(w/18); col++) {
        if ((row + col) % 3 !== 0) {
          ctx.fillRect(x+4+col*18, y+5+row*22, 9, 11);
        }
      }
    }
  }

  function drawPalmTree(x, y) {
    // Trunk
    ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.bezierCurveTo(x-5, y-30, x+5, y-60, x, y-80); ctx.stroke();
    // Leaves
    ctx.strokeStyle = '#228B22'; ctx.lineWidth = 4;
    const leaves = [[0,-80],[-25,-95],[-40,-80],[-20,-70],[25,-95],[40,-80],[20,-70],[0,-65]];
    leaves.forEach(([lx,ly])=>{
      ctx.beginPath(); ctx.moveTo(x,y-80); ctx.lineTo(x+lx, y+ly); ctx.stroke();
    });
    // Coconuts
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.arc(x-5, y-82, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+5, y-85, 4, 0, Math.PI*2); ctx.fill();
  }

  // ===================== PERSON SPAWNING =====================
  function spawnPerson() {
    const typeIndex = Math.floor(Math.random() * personTypes.length);
    const type = personTypes[typeIndex];
    const isKid = (type.id === 'kid');
    const scale = isKid ? 0.6 : 1.0;
    const speed = (1.5 + Math.random() * 1.5) * (isKid ? 1.3 : 1);
    const fromLeft = Math.random() > 0.5;
    const x = fromLeft ? -50 : 850;
    const dir = fromLeft ? 1 : -1;
    const y = 438 - (isKid ? 0 : 2); // base foot Y

    persons.push({
      x, y, dir, speed, type, scale,
      walkPhase: Math.random() * Math.PI * 2,
      clicked: false,
      clickEffect: 0, // 0=none, countdown to remove
      hitbox: { w: isKid ? 60 : 80, h: isKid ? 70 : 110 }
    });
  }

  // ===================== FLOATING TEXT =====================
  function spawnFloatText(x, y, good) {
    floatingTexts.push({ x, y, text: good ? '+1 ✓' : '-1 ✗', good, life: 1.0 });
  }

  function updateFloatTexts(dt) {
    floatingTexts.forEach(ft => { ft.y -= 1.5; ft.life -= dt * 1.5; });
    floatingTexts = floatingTexts.filter(ft => ft.life > 0);
  }

  function drawFloatTexts() {
    floatingTexts.forEach(ft => {
      ctx.globalAlpha = ft.life;
      ctx.font = 'bold 22px Arial';
      ctx.fillStyle = ft.good ? '#2ecc71' : '#e74c3c';
      ctx.textAlign = 'center';
      ctx.fillText(ft.text, ft.x, ft.y);
      ctx.globalAlpha = 1;
    });
    ctx.textAlign = 'left';
  }

  // ===================== CLICK DETECTION =====================
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  canvas.addEventListener('click', function(e) {
    if (!gameRunning) return;
    const pos = getCanvasPos(e);
    for (let i = persons.length - 1; i >= 0; i--) {
      const p = persons[i];
      if (p.clicked) continue;
      const hw = p.hitbox.w / 2;
      const hh = p.hitbox.h;
      // Person center x is p.x; feet at p.y
      if (pos.x >= p.x - hw && pos.x <= p.x + hw &&
          pos.y >= p.y - hh && pos.y <= p.y) {
        p.clicked = true;
        p.clickEffect = 0.8;
        const good = p.type.good;
        score += good ? 1 : -1;
        if (score < 0) score = 0;
        hudScore.textContent = score + ' / 5';
        spawnFloatText(p.x, p.y - hh * 0.7, good);
        // Remove person after brief flash
        setTimeout(() => {
          const idx = persons.indexOf(p);
          if (idx !== -1) persons.splice(idx, 1);
        }, 400);
        break;
      }
    }
  });

  // ===================== TOOLTIP =====================
  canvas.addEventListener('mousemove', function(e) {
    if (!gameRunning) return;
    const pos = getCanvasPos(e);
    let found = false;
    for (let i = persons.length - 1; i >= 0; i--) {
      const p = persons[i];
      const hw = p.hitbox.w / 2;
      const hh = p.hitbox.h;
      if (pos.x >= p.x - hw && pos.x <= p.x + hw &&
          pos.y >= p.y - hh && pos.y <= p.y) {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX - canvas.getBoundingClientRect().left + 15) + 'px';
        tooltip.style.top  = (e.clientY - canvas.getBoundingClientRect().top - 30) + 'px';
        const label = p.type.label + (p.type.good ? ' ✅ +1' : ' ❌ -1');
        tooltip.textContent = label;
        found = true;
        canvas.style.cursor = 'pointer';
        break;
      }
    }
    if (!found) {
      tooltip.style.display = 'none';
      canvas.style.cursor = 'default';
    }
  });

  canvas.addEventListener('mouseleave', function() {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  });

  // ===================== GAME LOOP =====================
  let lastTime = 0;
  function gameLoop(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.1);
    lastTime = ts;

    // Clear
    ctx.clearRect(0, 0, 800, 500);
    drawBackground();

    // Spawn
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnPerson();
      spawnTimer = 0.8 + Math.random() * 0.8;
    }

    // Update & draw persons
    persons = persons.filter(p => p.x > -150 && p.x < 950);
    persons.forEach(p => {
      if (!p.clicked) p.x += p.dir * p.speed;
      p.walkPhase += dt * 6 * (p.clicked ? 0 : 1);

      // Click flash effect
      if (p.clicked) {
        ctx.save();
        ctx.globalAlpha = p.clickEffect;
        ctx.fillStyle = p.type.good ? 'rgba(46,204,113,0.3)' : 'rgba(231,76,60,0.3)';
        ctx.beginPath();
        ctx.arc(p.x, p.y - p.hitbox.h/2, 40*p.scale, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        p.clickEffect = Math.max(0, p.clickEffect - dt * 2);
      }

      drawPerson(p.x, p.y, p.type, p.walkPhase, p.scale);
    });

    // Floating texts
    updateFloatTexts(dt);
    drawFloatTexts();

    // Score check
    if (score >= 5) {
      winLevel();
      return;
    }

    if (gameRunning) animFrameId = requestAnimationFrame(gameLoop);
  }

  // ===================== TIMER =====================
  function startTimer() {
    timeLeft = 30;
    hudTimer.textContent = timeLeft;
    timerInterval = setInterval(() => {
      if (!gameRunning) { clearInterval(timerInterval); return; }
      timeLeft--;
      hudTimer.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        gameRunning = false;
        cancelAnimationFrame(animFrameId);
        showFailScreen();
      }
    }, 1000);
  }

  // ===================== WIN LEVEL =====================
  function winLevel() {
    gameRunning = false;
    clearInterval(timerInterval);
    cancelAnimationFrame(animFrameId);
    tooltip.style.display = 'none';

    if (level === 3) {
      showTreasureScreen();
    } else {
      showCutscene();
    }
  }

  // ===================== CUTSCENE =====================
  const cutsceneData = [
    { emoji:'🍔', title:'第一关过了！', text:'辛苦了！去吃个汉堡庆祝 🍔\n明天继续拉客！' },
    { emoji:'🍜', title:'第二关过了！', text:'不错嘛！奖励自己一碗拉面 🍜\n最后一关加油！' },
  ];
  let cutsceneBarInterval = null;
  let cutsceneBarVal = 100;

  function showCutscene() {
    const data = cutsceneData[level - 1];
    document.getElementById('cutsceneEmoji').textContent = data.emoji;
    document.getElementById('cutsceneTitle').textContent = data.title;
    document.getElementById('cutsceneText').textContent  = data.text;
    const bar = document.getElementById('cutsceneBar');
    cutsceneBarVal = 100;
    bar.style.width = '100%';
    cutsceneScreen.style.display = 'flex';

    if (cutsceneBarInterval) clearInterval(cutsceneBarInterval);
    cutsceneBarInterval = setInterval(() => {
      cutsceneBarVal -= 1;
      bar.style.width = cutsceneBarVal + '%';
      if (cutsceneBarVal <= 0) {
        clearInterval(cutsceneBarInterval);
        advanceLevel();
      }
    }, 40); // 4 seconds total
  }

  function advanceLevel() {
    clearInterval(cutsceneBarInterval);
    cutsceneScreen.style.display = 'none';
    level++;
    startLevel();
  }

  // ===================== TREASURE SCREEN =====================
  let treasureBarInterval = null;

  function showTreasureScreen() {
    const bar = document.getElementById('treasureBar');
    let val = 100;
    bar.style.width = '100%';
    treasureScreen.style.display = 'flex';

    if (treasureBarInterval) clearInterval(treasureBarInterval);
    treasureBarInterval = setInterval(() => {
      val -= 0.8;
      bar.style.width = val + '%';
      if (val <= 0) clearInterval(treasureBarInterval);
    }, 40);
  }

  // ===================== FAIL SCREEN =====================
  let failBarInterval = null;

  function showFailScreen() {
    const bar = document.getElementById('failBar');
    let val = 100;
    bar.style.width = '100%';
    failScreen.style.display = 'flex';
    tooltip.style.display = 'none';

    if (failBarInterval) clearInterval(failBarInterval);
    failBarInterval = setInterval(() => {
      val -= 1;
      bar.style.width = val + '%';
      if (val <= 0) clearInterval(failBarInterval);
    }, 40);
  }

  // ===================== START / RESET =====================
  function startLevel() {
    persons = [];
    floatingTexts = [];
    score = 0;
    spawnTimer = 0;
    hudLevel.textContent = level;
    hudScore.textContent  = '0 / 5';
    hudTimer.textContent  = '30';

    canvas.style.display = 'block';
    hud.style.display = 'flex';
    cutsceneScreen.style.display = 'none';
    failScreen.style.display     = 'none';
    treasureScreen.style.display = 'none';

    gameRunning = true;
    lastTime = 0;
    animFrameId = requestAnimationFrame(function(ts) { lastTime = ts; gameLoop(ts); });
    startTimer();
  }

  function resetGame() {
    clearInterval(timerInterval);
    clearInterval(cutsceneBarInterval);
    clearInterval(failBarInterval);
    clearInterval(treasureBarInterval);
    cancelAnimationFrame(animFrameId);
    gameRunning = false;
    level = 1;
    cutsceneScreen.style.display = 'none';
    failScreen.style.display     = 'none';
    treasureScreen.style.display = 'none';
    startLevel();
  }

  // ===================== BUTTON HANDLERS =====================
  // Start button
  document.getElementById('startBtn').addEventListener('click', function() {
    startScreen.style.display = 'none';
    level = 1;
    startLevel();
  });

  // Cutscene skip button
  document.getElementById('cutsceneSkipBtn').addEventListener('click', function() {
    advanceLevel();
  });

  // Treasure next button (restart from level 1 or just show title again)
  document.getElementById('treasureNextBtn').addEventListener('click', function() {
    clearInterval(treasureBarInterval);
    treasureScreen.style.display = 'none';
    // Go back to start screen
    canvas.style.display = 'none';
    hud.style.display = 'none';
    startScreen.style.display = 'flex';
    level = 1;
    gameRunning = false;
  });

  // Fail retry button
  document.getElementById('failRetryBtn').addEventListener('click', function() {
    clearInterval(failBarInterval);
    failScreen.style.display = 'none';
    // Retry same level
    startLevel();
  });

  // ===================== CANVAS SCALING =====================
  // Responsive scaling so the game fits any screen
  function resizeGame() {
    const container = document.getElementById('gameContainer');
    const ww = window.innerWidth;
    const wh = window.innerHeight;
    const scale = Math.min(ww / 820, wh / 520);
    container.style.transform = `scale(${scale})`;
    container.style.transformOrigin = 'center center';
  }
  window.addEventListener('resize', resizeGame);
  resizeGame();

}); // end DOMContentLoaded
</script>
</body>
