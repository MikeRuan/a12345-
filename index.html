<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园迷宫大冒险 🏫</title>
<style>
  /* 全局样式 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* 游戏标题 */
  #title {
    color: white;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 6px;
    letter-spacing: 2px;
  }

  /* 状态栏 */
  #hud {
    display: flex;
    gap: 16px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.95);
    padding: 7px 18px;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    align-items: center;
    font-size: 15px;
    font-weight: bold;
  }
  #hud span { display: flex; align-items: center; gap: 4px; }

  /* 游戏画布容器 */
  #game-container {
    position: relative;
    border: 4px solid rgba(255,255,255,0.8);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  canvas {
    display: block;
  }

  /* 消息弹窗 */
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20,10,40,0.93);
    color: white;
    padding: 24px 32px;
    border-radius: 18px;
    text-align: center;
    display: none;
    z-index: 100;
    border: 3px solid #f1c40f;
    min-width: 270px;
    box-shadow: 0 0 40px rgba(241,196,15,0.4);
  }
  #message h2 { font-size: 30px; margin-bottom: 10px; }
  #message p  { font-size: 14px; margin-bottom: 16px; color: #ddd; white-space: pre-line; }
  #message button {
    background: linear-gradient(135deg, #f1c40f, #e67e22);
    border: none;
    color: white;
    padding: 10px 26px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.1s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }
  #message button:hover { transform: scale(1.07); }

  /* 提示弹窗 */
  #hint-popup {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff9c4;
    color: #333;
    padding: 8px 18px;
    border-radius: 10px;
    border: 2px solid #f1c40f;
    font-size: 13px;
    font-weight: bold;
    display: none;
    z-index: 99;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    max-width: 320px;
    pointer-events: none;
  }

  /* 操作说明 */
  #controls-hint {
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    margin-top: 5px;
    text-align: center;
  }

  /* 移动端方向键 */
  #dpad {
    display: none;
    margin-top: 10px;
    user-select: none;
  }
  #dpad-row { display: flex; justify-content: center; gap: 6px; margin: 3px 0; }
  .dpad-btn {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.85);
    border: none;
    border-radius: 12px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    transition: transform 0.1s, background 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .dpad-btn:active { transform: scale(0.9); background: #f1c40f; }

  @media (max-width: 600px) {
    #dpad { display: block; }
    #controls-hint { display: none; }
    #title { font-size: 20px; }
    #hud { font-size: 12px; gap: 10px; padding: 5px 12px; }
  }
</style>
</head>
<body>

<div id="title">🏫 校园迷宫大冒险</div>

<!-- 状态栏 HUD -->
<div id="hud">
  <span>❤️ 生命：<span id="lives-display">❤️❤️❤️</span></span>
  <span>🔑 钥匙：<span id="keys-display">0/5</span></span>
  <span>⭐ 关卡：<span id="level-display">1</span></span>
</div>

<!-- 游戏容器 -->
<div id="game-container">
  <canvas id="gameCanvas" width="560" height="420"></canvas>
  
  <!-- 消息弹窗 -->
  <div id="message">
    <h2 id="msg-title">🎉 过关！</h2>
    <p id="msg-body">你找到了所有钥匙！</p>
    <button id="msg-btn" onclick="handleMessageBtn()">继续</button>
  </div>

  <!-- 提示弹窗 -->
  <div id="hint-popup">💡 <span id="hint-text"></span></div>
</div>

<!-- 操作说明 -->
<div id="controls-hint">⬆️⬇️⬅️➡️ 方向键移动 &nbsp;|&nbsp; 走到 📋 提示牌查看提示</div>

<!-- 移动端方向键 -->
<div id="dpad">
  <div id="dpad-row"><button class="dpad-btn" ontouchstart="dpadPress('up')" ontouchend="dpadRelease('up')" onmousedown="dpadPress('up')" onmouseup="dpadRelease('up')">⬆️</button></div>
  <div id="dpad-row">
    <button class="dpad-btn" ontouchstart="dpadPress('left')" ontouchend="dpadRelease('left')" onmousedown="dpadPress('left')" onmouseup="dpadRelease('left')">⬅️</button>
    <button class="dpad-btn" ontouchstart="dpadPress('down')" ontouchend="dpadRelease('down')" onmousedown="dpadPress('down')" onmouseup="dpadRelease('down')">⬇️</button>
    <button class="dpad-btn" ontouchstart="dpadPress('right')" ontouchend="dpadRelease('right')" onmousedown="dpadPress('right')" onmouseup="dpadRelease('right')">➡️</button>
  </div>
</div>

<script>
// ============================================================
// 🎮 校园迷宫大冒险 - 主程序
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 每个格子的像素大小
const TILE = 28;
const COLS = 20;
const ROWS = 15;

// 格子类型
const EMPTY = 0;
const WALL  = 1;
const KEY   = 2;
const DOOR  = 3;
const SIGN  = 4;

// ============================================================
// 游戏状态对象
// ============================================================
let gameState = {
  level: 1,
  lives: 3,
  keysCollected: 0,
  totalKeys: 5,
  invincible: false,
  invincibleTimer: 0,
  gameOver: false,
  levelCleared: false,
  messageShown: false
};

// 游戏对象
let currentMap = [];
let player = {};
let teachers = [];
let keys = [];
let signs = [];
let door = {};
let hintTimer = 0;
let frameCount = 0;
let moveCooldown = 0;

// 虚拟方向键状态（移动端用）
let dpadKeys = { up: false, down: false, left: false, right: false };

// ============================================================
// 关卡地图 (20列 x 15行)
// W=墙 .=空 K=钥匙 D=门 S=提示牌 P=玩家 T=老师
// ============================================================

const LEVEL1_STR = [
  'WWWWWWWWWWWWWWWWWWWW',
  'WP.......W....K....W',
  'W.WWWWW..W.WWWWW...W',
  'W.W...W..W.W...W...W',
  'W.W.K.W....W.S.W...W',
  'W.W...WWWWWW...W...W',
  'W.WWWWW....WWWWW...W',
  'W.......T..........W',
  'WWWWWWW.WWWWW.WWWWWW',
  'W.K....W.....W.....W',
  'W.WWWW.W.WWW.W.WWW.W',
  'W...........S......W',
  'W.WWWW.WWWWW.WWW...W',
  'W...K......K.....D.W',
  'WWWWWWWWWWWWWWWWWWWW'
];

const LEVEL2_STR = [
  'WWWWWWWWWWWWWWWWWWWW',
  'WP..W......W...K...W',
  'W...W.WWWW.W.WWWWW.W',
  'W.K.W.W..W.W.W.....W',
  'W...W.W.KW.W.W.WWW.W',
  'WWWWW.W..W...W.W.W.W',
  'W.....WWWWWWWW.W.W.W',
  'W.WWW.T........W.W.W',
  'W.W.W.WWWWWWWW.W.W.W',
  'W.W.W.W....K.W.W...W',
  'W.W.W.W.WW..W.....WW',
  'W...W...WW.WWWWWW..W',
  'WWWWWWWWWW.W.....S.W',
  'WT.K.......W.....D.W',
  'WWWWWWWWWWWWWWWWWWWW'
];

const LEVEL3_STR = [
  'WWWWWWWWWWWWWWWWWWWW',
  'WP.W...W...W.......W',
  'W..W.W.W.W.W.WWWWWWW',
  'W..W.W...W.W.W.....W',
  'W.KW.WWWWW.W.W.K...W',
  'W..W.......W.W.WWWWW',
  'W..WWWWWWW.W.W.....W',
  'W..W...T.W.W.W.WWW.W',
  'W..W.WWW.W.W.W.W.W.W',
  'W.KW.W.K.W...W.W.W.W',
  'W..W.W...WWWWW.W.W.W',
  'W..W.WWWWW.....W.W.W',
  'WT.W...W...WWWWW.S.W',
  'W..W.T.W.K.........W',
  'WWWWWWWWWWWWWWWDWWWW'
];

const ALL_LEVELS = [LEVEL1_STR, LEVEL2_STR, LEVEL3_STR];

// 提示牌文字（每关2条）
const SIGN_HINTS = [
  ['收集5把🔑才能打开图书馆大门！加油！', '小心老师巡逻，碰到会扣一条命哦！'],
  ['第2关！老师变多了，要更小心！', '钥匙藏在角落里，仔细搜索吧！'],
  ['最终关卡！三位老师在巡逻！', '你快成功了！找齐钥匙，冲向大门！']
];

// ============================================================
// 解析字符地图
// ============================================================
function parseMap(strMap) {
  let result = { map: [], player: null, teachers: [], keys: [], signs: [], door: null };
  for (let r = 0; r < strMap.length; r++) {
    result.map.push([]);
    for (let c = 0; c < strMap[r].length; c++) {
      let ch = strMap[r][c];
      if      (ch === 'W') { result.map[r].push(WALL); }
      else if (ch === 'K') { result.map[r].push(KEY);  result.keys.push({x:c,y:r,collected:false}); }
      else if (ch === 'D') { result.map[r].push(DOOR); result.door = {x:c,y:r}; }
      else if (ch === 'S') { result.map[r].push(SIGN); result.signs.push({x:c,y:r}); }
      else if (ch === 'P') { result.map[r].push(EMPTY); result.player = {x:c,y:r}; }
      else if (ch === 'T') { result.map[r].push(EMPTY); result.teachers.push({x:c,y:r}); }
      else                 { result.map[r].push(EMPTY); }
    }
  }
  return result;
}

// ============================================================
// 初始化关卡
// ============================================================
function initLevel(levelNum) {
  gameState.keysCollected = 0;
  gameState.levelCleared  = false;
  gameState.invincible    = false;
  gameState.invincibleTimer = 0;
  moveCooldown = 0;

  let data = parseMap(ALL_LEVELS[levelNum - 1]);
  currentMap = data.map;
  keys   = data.keys;
  signs  = data.signs;
  door   = data.door;

  // 玩家初始化
  player = {
    x: data.player.x,
    y: data.player.y,
    facing: 2,       // 0=up 1=left 2=down 3=right
    walkFrame: 0,
    walkTimer: 0,
    startX: data.player.x,
    startY: data.player.y
  };

  // 老师初始化，生成巡逻路径
  teachers = data.teachers.map((t, i) => ({
    x: t.x, y: t.y,
    startX: t.x, startY: t.y,
    path: [], pathIndex: 0,
    moveTimer: 0,
    moveDelay: 30 + i * 10,
    walkFrame: 0,
    color: ['#e74c3c','#8e44ad','#16a085'][i % 3]
  }));
  teachers.forEach(t => buildPatrol(t));

  updateHUD();
  hideMessage();
}

// ============================================================
// 为老师生成巡逻路径（往返折返）
// ============================================================
function buildPatrol(t) {
  let path = [{x:t.x, y:t.y}];

  // 向右最多7步
  for (let i = 1; i <= 7; i++) {
    let nx = t.x + i;
    if (nx < COLS && currentMap[t.y][nx] === EMPTY) path.push({x:nx, y:t.y});
    else break;
  }
  // 向下最多5步（从最右端）
  let lx = path[path.length-1].x, ly = t.y;
  for (let i = 1; i <= 5; i++) {
    let ny = ly + i;
    if (ny < ROWS && currentMap[ny][lx] === EMPTY) path.push({x:lx, y:ny});
    else break;
  }
  // 路径太短就向左走
  if (path.length < 2) {
    for (let i = 1; i <= 4; i++) {
      let nx = t.x - i;
      if (nx >= 0 && currentMap[t.y][nx] === EMPTY) path.push({x:nx, y:t.y});
      else break;
    }
  }
  // 往返：去程 + 返程
  let full = [...path];
  for (let i = path.length - 2; i >= 0; i--) full.push(path[i]);

  t.path = full;
  t.pathIndex = 0;
}

// ============================================================
// 键盘输入
// ============================================================
let keysDown = {};
document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  keysDown[e.key] = true;
});
document.addEventListener('keyup', e => { keysDown[e.key] = false; });

// 移动端虚拟方向键
function dpadPress(dir)   { dpadKeys[dir] = true; }
function dpadRelease(dir) { dpadKeys[dir] = false; }

// ============================================================
// 处理玩家移动
// ============================================================
function handleInput() {
  if (moveCooldown > 0) { moveCooldown--; return; }
  if (gameState.messageShown) return;

  let dx = 0, dy = 0;
  if (keysDown['ArrowUp']    || dpadKeys.up)    { dy = -1; player.facing = 0; }
  if (keysDown['ArrowDown']  || dpadKeys.down)  { dy =  1; player.facing = 2; }
  if (keysDown['ArrowLeft']  || dpadKeys.left)  { dx = -1; player.facing = 1; }
  if (keysDown['ArrowRight'] || dpadKeys.right) { dx =  1; player.facing = 3; }

  if (dx === 0 && dy === 0) return;

  let nx = player.x + dx;
  let ny = player.y + dy;

  // 边界检测
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  // 墙壁检测
  if (currentMap[ny][nx] === WALL) return;

  // 门检测：只有集满钥匙才能进入
  if (currentMap[ny][nx] === DOOR) {
    if (gameState.keysCollected >= gameState.totalKeys) {
      doLevelClear();
    } else {
      showHint('🔒 还需要 ' + (gameState.totalKeys - gameState.keysCollected) + ' 把钥匙才能开门！');
    }
    return;
  }

  // 移动
  player.x = nx;
  player.y = ny;
  player.walkTimer++;
  if (player.walkTimer % 6 === 0) player.walkFrame = (player.walkFrame + 1) % 4;
  moveCooldown = 7;

  // 捡钥匙检测
  keys.forEach(k => {
    if (!k.collected && k.x === player.x && k.y === player.y) {
      k.collected = true;
      currentMap[k.y][k.x] = EMPTY;
      gameState.keysCollected++;
      updateHUD();
      if (gameState.keysCollected >= gameState.totalKeys) {
        showHint('🎉 集齐所有钥匙！快找图书馆大门 🚪！');
      } else {
        showHint('✨ 捡到钥匙！还差 ' + (gameState.totalKeys - gameState.keysCollected) + ' 把！');
      }
    }
  });

  // 踩到提示牌
  signs.forEach((s, i) => {
    if (s.x === player.x && s.y === player.y) {
      let arr = SIGN_HINTS[gameState.level - 1];
      showHint(arr[i % arr.length]);
    }
  });
}

// ============================================================
// 更新老师位置
// ============================================================
function updateTeachers() {
  teachers.forEach(t => {
    t.moveTimer++;
    if (t.moveTimer >= t.moveDelay) {
      t.moveTimer = 0;
      if (t.path.length > 0) {
        t.pathIndex = (t.pathIndex + 1) % t.path.length;
        t.x = t.path[t.pathIndex].x;
        t.y = t.path[t.pathIndex].y;
        t.walkFrame = (t.walkFrame + 1) % 4;
      }
    }
    // 碰撞检测
    if (t.x === player.x && t.y === player.y && !gameState.invincible) {
      hitByTeacher();
    }
  });
}

// ============================================================
// 被老师碰到
// ============================================================
function hitByTeacher() {
  gameState.lives--;
  gameState.invincible = true;
  gameState.invincibleTimer = 140;
  updateHUD();

  if (gameState.lives <= 0) {
    doGameOver();
  } else {
    showHint('😱 被老师抓到了！还剩 ' + gameState.lives + ' 条命！');
    // 回到出生点
    player.x = player.startX;
    player.y = player.startY;
  }
}

// ============================================================
// 无敌计时更新
// ============================================================
function updateInvincible() {
  if (gameState.invincible) {
    gameState.invincibleTimer--;
    if (gameState.invincibleTimer <= 0) {
      gameState.invincible = false;
    }
  }
}

// ============================================================
// 过关 / 游戏结束
// ============================================================
function doLevelClear() {
  gameState.levelCleared = true;
  gameState.messageShown = true;
  if (gameState.level >= 3) {
    showMessage('🎊 全部通关！', '太棒了！你找齐钥匙并打开了图书馆大门！\n你完成了全部3关，你是最棒的学生！🏆', '再玩一次');
  } else {
    showMessage('🎉 第' + gameState.level + '关通过！', '找齐钥匙，成功开门！\n准备好迎接下一关的挑战了吗？', '进入第' + (gameState.level + 1) + '关 →');
  }
}

function doGameOver() {
  gameState.gameOver = true;
  gameState.messageShown = true;
  showMessage('💔 游戏结束', '被老师抓到太多次了...\n下次要小心绕过老师哦！加油！', '重新开始');
}

// ============================================================
// 弹窗控制
// ============================================================
function showMessage(title, body, btnText) {
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-body').textContent = body;
  document.getElementById('msg-btn').textContent = btnText;
  document.getElementById('message').style.display = 'block';
}

function hideMessage() {
  document.getElementById('message').style.display = 'none';
  gameState.messageShown = false;
}

function handleMessageBtn() {
  if (gameState.gameOver) {
    gameState.lives    = 3;
    gameState.level    = 1;
    gameState.gameOver = false;
    initLevel(1);
  } else if (gameState.levelCleared) {
    if (gameState.level >= 3) {
      gameState.lives = 3;
      gameState.level = 1;
      initLevel(1);
    } else {
      gameState.level++;
      initLevel(gameState.level);
    }
  }
}

// ============================================================
// 提示弹窗
// ============================================================
function showHint(text) {
  document.getElementById('hint-text').textContent = text;
  document.getElementById('hint-popup').style.display = 'block';
  hintTimer = 200;
}

// ============================================================
// 更新 HUD
// ============================================================
function updateHUD() {
  let h = '';
  for (let i = 0; i < gameState.lives; i++) h += '❤️';
  for (let i = gameState.lives; i < 3; i++)  h += '🖤';
  document.getElementById('lives-display').textContent = h;
  document.getElementById('keys-display').textContent  = gameState.keysCollected + '/' + gameState.totalKeys;
  document.getElementById('level-display').textContent = gameState.level;
}

// ============================================================
// ✏️ 绘制函数
// ============================================================

/* ---------- 绘制地图格子 ---------- */
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let px = c * TILE, py = r * TILE;
      let tile = currentMap[r][c];

      if (tile === WALL) {
        // 砖墙主体
        ctx.fillStyle = '#5b6b8a';
        ctx.fillRect(px, py, TILE, TILE);
        // 砖纹高光
        ctx.fillStyle = '#7a8fad';
        ctx.fillRect(px+1, py+1, TILE-2, 7);
        ctx.fillStyle = '#4a5770';
        ctx.fillRect(px, py+8, TILE, 1);
        ctx.fillRect(px, py+16, TILE, 1);
        // 左侧竖线
        ctx.fillStyle = '#4a5770';
        ctx.fillRect(px + TILE/2, py+1, 1, 7);
      } else {
        // 地板（两色棋盘）
        ctx.fillStyle = (r+c)%2===0 ? '#f0f8e8' : '#e4f0da';
        ctx.fillRect(px, py, TILE, TILE);
        // 地板浅网格线
        ctx.strokeStyle = 'rgba(0,0,0,0.04)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(px, py, TILE, TILE);
      }

      // 门
      if (tile === DOOR) {
        let open = gameState.keysCollected >= gameState.totalKeys;
        // 门框
        ctx.fillStyle = '#7b4f2e';
        ctx.fillRect(px, py, TILE, TILE);
        // 门板
        let grad = ctx.createLinearGradient(px+2, py, px+TILE-2, py);
        if (open) { grad.addColorStop(0,'#27ae60'); grad.addColorStop(1,'#2ecc71'); }
